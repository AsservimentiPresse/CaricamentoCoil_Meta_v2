<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Stable Quest 3</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

// ✅ AR BUTTON (STABILE)
document.body.appendChild(
  ARButton.createButton(renderer)
);

// =====================
// LIGHT (NO BLACK SCREEN)
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(3,5,2);
scene.add(light);

// =====================
// MODEL
// =====================
let model;

new GLTFLoader().load("linea%20lunga_V4.glb", (gltf)=>{

  model = gltf.scene;
  scene.add(model);

  model.position.set(0,0,-1);
  model.scale.set(1,1,1);

});

// =====================
// XR INPUT (SAFE MODE)
// =====================
const controller1 = renderer.xr.getController(0);
const controller2 = renderer.xr.getController(1);

scene.add(controller1);
scene.add(controller2);

// =====================
// SIMPLE INTERACTION TEST
// =====================
let dragging = false;

controller1.addEventListener("selectstart", ()=> dragging = true);
controller1.addEventListener("selectend", ()=> dragging = false);

// =====================
// MOVE MODEL (SAFE TEST)
// =====================
function move(){

  if(!model || !dragging) return;

  const p = new THREE.Vector3();
  controller1.getWorldPosition(p);

  model.position.lerp(p, 0.2);
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

  move();

  renderer.render(scene,camera);
});

</script>

</body>
</html>
