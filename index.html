<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Continuous Pinch System</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
scene.add(new THREE.DirectionalLight(0xffffff,2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

    model=gltf.scene;
    scene.add(model);

    const box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5/size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0); // sinistra UI
const controller1 = renderer.xr.getController(1); // destra interaction

scene.add(controller0);
scene.add(controller1);

// =====================
// LASER
// =====================
function makeLaser(color){

    const geo=new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);

    const line=new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({color})
    );

    line.scale.z=10;
    return line;
}

controller0.add(makeLaser(0x00ff00));
controller1.add(makeLaser(0xff0000));

// =====================
// MODE SYSTEM
// =====================
let mode="move";
let frozen=false;

// =====================
// UI SINISTRA
// =====================
const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

const modes=["move","rotate","zoom","lock"];
const ui=[];

for(let i=0;i<modes.length;i++){

    const m=new THREE.Mesh(
        new THREE.BoxGeometry(0.09,0.09,0.09),
        new THREE.MeshStandardMaterial({color:0x333333})
    );

    m.position.set(-0.3 + i*0.23, 0.8, -0.6);

    m.userData.mode=modes[i];

    scene.add(m);
    ui.push(m);
}

controller0.addEventListener("selectstart",()=>controller0.userData.select=true);
controller0.addEventListener("selectend",()=>controller0.userData.select=false);

function updateUI(){

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits=raycaster.intersectObjects(ui);

    ui.forEach(b=>b.material.color.set(0x333333));

    if(hits.length){

        const obj=hits[0].object;
        obj.material.color.set(0x00ffcc);

        if(controller0.userData.select){

            if(obj.userData.mode==="lock"){
                frozen=!frozen;
            } else {
                mode=obj.userData.mode;
            }
        }
    }
}

// =====================
// PINCH CONTINUO (DESTRA)
// =====================
let isPinching=false;

controller1.addEventListener("selectstart",()=>{

    if(frozen) return;

    isPinching=true;
});

controller1.addEventListener("selectend",()=>{

    isPinching=false;
});

// =====================
// RAYCAST DESTRA
// =====================
const raycasterR=new THREE.Raycaster();
const tempMatrixR=new THREE.Matrix4();

// =====================
// ACTION CONTINUA
// =====================
const lastPos=new THREE.Vector3();

function updateAction(){

    if(!model || !isPinching || frozen) return;

    tempMatrixR.identity().extractRotation(controller1.matrixWorld);

    raycasterR.ray.origin.setFromMatrixPosition(controller1.matrixWorld);
    raycasterR.ray.direction.set(0,0,-1).applyMatrix4(tempMatrixR);

    const hit=raycasterR.intersectObject(model,true);

    if(!hit.length) return;

    const point=hit[0].point;

    if(mode==="move"){

        model.position.lerp(point,0.2);
    }

    if(mode==="rotate"){

        const p=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);
        model.rotation.y += (p.x - lastPos.x)*2;
        lastPos.copy(p);
    }

    if(mode==="zoom"){

        model.scale.multiplyScalar(1.01);
    }
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    updateUI();
    updateAction();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
