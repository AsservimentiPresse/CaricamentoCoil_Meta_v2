<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Clean Mode Driven Pinch</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
scene.add(new THREE.DirectionalLight(0xffffff,2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

    model=gltf.scene;
    scene.add(model);

    const box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5/size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// =====================
// LASERS + CURSORS (UNCHANGED)
// =====================
function makeLaser(color){

    const geo=new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);

    const line=new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({color})
    );

    line.scale.z=10;
    return line;
}

controller0.add(makeLaser(0xff0000));
controller1.add(makeLaser(0x00ff00));

// =====================
// MODE SYSTEM
// =====================
const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

let mode="move";
let frozen=false;

// =====================
// UI BUTTONS (LOWER + LABELED)
// =====================
const modes=[
    {name:"MOVE", color:0x00ffcc},
    {name:"ROTATE", color:0xffcc00},
    {name:"ZOOM", color:0x66aaff},
    {name:"LOCK", color:0xff4444}
];

const modeUI=[];

for(let i=0;i<modes.length;i++){

    const group=new THREE.Group();

    const box=new THREE.Mesh(
        new THREE.BoxGeometry(0.09,0.09,0.09),
        new THREE.MeshStandardMaterial({color:modes[i].color})
    );

    const canvas=document.createElement("canvas");
    canvas.width=256;
    canvas.height=128;
    const ctx=canvas.getContext("2d");

    ctx.fillStyle="white";
    ctx.font="bold 60px Arial";
    ctx.fillText(modes[i].name,20,80);

    const tex=new THREE.CanvasTexture(canvas);

    const label=new THREE.Mesh(
        new THREE.PlaneGeometry(0.15,0.07),
        new THREE.MeshBasicMaterial({map:tex,transparent:true})
    );

    label.position.set(0,-0.08,0);

    group.add(box);
    group.add(label);

    // 🔽 ABBASSATI
    group.position.set(-0.35 + i*0.23, 0.75, -0.6);

    group.userData.mode=modes[i].name.toLowerCase();

    scene.add(group);
    modeUI.push(group);
}

// =====================
// MODE SELECT
// =====================
function setMode(m){

    mode=m;

    if(m==="lock"){
        frozen=!frozen;
    }

    modeUI.forEach(b=>{
        b.children[0].material.color.set(0x333333);
    });

    const active=modeUI.find(b=>b.userData.mode===m);
    if(active){
        active.children[0].material.color.set(0xffffff);
    }
}

// =====================
// UI INTERACTION
// =====================
function updateUI(){

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits=raycaster.intersectObjects(modeUI,true);

    modeUI.forEach(b=>b.children[0].material.opacity=1);

    if(hits.length){

        const root=hits[0].object.parent;

        if(root){
            root.children[0].material.opacity=0.6;

            if(controller0.userData.selecting){
                setMode(root.userData.mode);
            }
        }
    }
}

controller0.addEventListener("selectstart",()=>controller0.userData.selecting=true);
controller0.addEventListener("selectend",()=>controller0.userData.selecting=false);

// =====================
// PINCH STATE (IMPORTANT FIX)
// =====================
let pinch=false;

controller0.addEventListener("selectstart",()=>pinch=true);
controller0.addEventListener("selectend",()=>pinch=false);

// =====================
// MOVE
// =====================
function move(){

    if(!model || frozen || mode!=="move" || !pinch) return;

    const p=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);
    model.position.lerp(new THREE.Vector3(p.x,p.y,p.z-1),0.2);
}

// =====================
// ROTATE
// =====================
const last=new THREE.Vector3();

function rotate(){

    if(!model || frozen || mode!=="rotate" || !pinch) return;

    const p=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    model.rotation.y += (p.x-last.x)*2;

    last.copy(p);
}

// =====================
// ZOOM
// =====================
let baseD=null, baseS=1;

function zoom(){

    if(!model || frozen || mode!=="zoom" || !pinch) return;

    const p1=new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const p2=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    const d=p1.distanceTo(p2);

    if(baseD===null){
        baseD=d;
        baseS=model.scale.x;
    }

    model.scale.setScalar(baseS*(d/baseD));
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    updateUI();

    move();
    rotate();
    zoom();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
