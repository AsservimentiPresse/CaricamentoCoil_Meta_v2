<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Pro Fixed</title>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  50
);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(
  ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
  })
);

// =====================
// LIGHT
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x666666, 2));

const dir = new THREE.DirectionalLight(0xffffff, 2.5);
dir.position.set(5, 10, 5);
scene.add(dir);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

  model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());

  model.position.sub(center);

  const size = box.getSize(new THREE.Vector3()).length();
  model.scale.setScalar(1.2 / size);

  model.position.set(0, 0, -1);
});

// =====================
// CONTROLLERS
// =====================
const right = renderer.xr.getController(0);
const left = renderer.xr.getController(1);

scene.add(right);
scene.add(left);

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// =====================
// LASERS (CURSORS PRO)
// =====================
function createLaser(color) {

  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -1)
  ]);

  const mat = new THREE.LineBasicMaterial({ color });

  const line = new THREE.Line(geo, mat);
  scene.add(line);

  return line;
}

const laserR = createLaser(0x00ffff);
const laserL = createLaser(0xff00ff);

// hit markers
const hitGeo = new THREE.SphereGeometry(0.008);
const hitMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

const hitR = new THREE.Mesh(hitGeo, hitMat.clone());
const hitL = new THREE.Mesh(hitGeo, hitMat.clone());

scene.add(hitR);
scene.add(hitL);

// =====================
// STATE
// =====================
let move = false;
let rotate = false;

let locked = false;

let baseDistance = null;
let baseScale = 1;

let selected = null;

// =====================
// DISTANCE
// =====================
function dist(a, b) {

  const p1 = new THREE.Vector3().setFromMatrixPosition(a.matrixWorld);
  const p2 = new THREE.Vector3().setFromMatrixPosition(b.matrixWorld);

  return p1.distanceTo(p2);
}

// =====================
// LASER UPDATE + HIT TEST
// =====================
function updateLaser(controller, laser, hitDot) {

  if (!model) return [];

  tempMatrix.identity().extractRotation(controller.matrixWorld);

  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const hits = raycaster.intersectObject(model, true);

  const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);

  laser.position.copy(origin);

  laser.quaternion.setFromUnitVectors(
    new THREE.Vector3(0, 0, 1),
    raycaster.ray.direction.clone().normalize()
  );

  laser.scale.z = 2;

  if (hits.length > 0) {

    hitDot.visible = true;
    hitDot.position.copy(hits[0].point);

    hitDot.material.color.set(0x00ff88);

  } else {

    hitDot.visible = false;
  }

  return hits;
}

// =====================
// UI
// =====================
const ui = new THREE.Group();
scene.add(ui);

const buttons = [];

function makeBtn(x, color, fn) {

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 0.06, 0.02),
    new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.5
    })
  );

  b.position.set(x, 0.25, -0.35);
  b.userData.fn = fn;

  ui.add(b);
  buttons.push(b);

  return b;
}

// color buttons
makeBtn(-0.25, 0xff4444, () => {
  if (selected) selected.material.color.set(0xff4444);
});

makeBtn(0, 0x44ff44, () => {
  if (selected) selected.material.color.set(0x44ff44);
});

makeBtn(0.25, 0x4488ff, () => {
  if (selected) selected.material.color.set(0x4488ff);
});

// lock
makeBtn(0, 0xffff00, () => {
  locked = !locked;
});

// =====================
// ATTACH UI
// =====================
function attachUI() {

  if (!model) return;

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());

  ui.position.copy(center);
  ui.position.y += 0.6;
}

// =====================
// PICK MODEL
// =====================
function pick(controller) {

  if (!model) return;

  tempMatrix.identity().extractRotation(controller.matrixWorld);

  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const hits = raycaster.intersectObject(model, true);

  if (hits.length > 0) {
    selected = hits[0].object;
  }
}

// =====================
// CLICK UI OR MODEL
// =====================
function click(controller) {

  tempMatrix.identity().extractRotation(controller.matrixWorld);

  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const hits = raycaster.intersectObjects(buttons);

  if (hits.length > 0) {

    hits[0].object.userData.fn?.();

  } else {

    pick(controller);
  }
}

// =====================
// CONTROLS
// =====================
right.addEventListener("select", () => click(right));

left.addEventListener("select", () => click(left));

right.addEventListener("selectstart", () => move = true);
right.addEventListener("selectend", () => move = false);

left.addEventListener("selectstart", () => rotate = true);
left.addEventListener("selectend", () => rotate = false);

// =====================
// UPDATE MOVE
// =====================
function updateMove() {

  if (!model || locked) return;

  const p = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);

  model.position.lerp(p, 0.2);
}

// =====================
// UPDATE ROTATE
// =====================
const last = new THREE.Vector3();

function updateRotate() {

  if (!model || locked) return;

  const p = new THREE.Vector3().setFromMatrixPosition(left.matrixWorld);

  const dx = p.x - last.x;

  model.rotation.y += dx * 2.0;

  last.copy(p);
}

// =====================
// ZOOM ONLY IF BOTH POINT MODEL + CLOSE HANDS
// =====================
function updateZoom() {

  if (!model || locked) return;

  const hitsR = updateLaser(right, laserR, hitR);
  const hitsL = updateLaser(left, laserL, hitL);

  const bothOnModel =
    hitsR.length > 0 &&
    hitsL.length > 0;

  const handsClose = dist(right, left) < 0.15;

  if (!bothOnModel || !handsClose) {
    baseDistance = null;
    return;
  }

  const d = dist(right, left);

  if (baseDistance === null) {
    baseDistance = d;
    baseScale = model.scale.x;
    return;
  }

  model.scale.setScalar(baseScale * (d / baseDistance));
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

  updateLaser(right, laserR, hitR);
  updateLaser(left, laserL, hitL);

  if (!locked) {

    if (move) updateMove();
    if (rotate) updateRotate();

    updateZoom();
  }

  attachUI();

  renderer.render(scene, camera);
});

</script>

</body>
</html>
