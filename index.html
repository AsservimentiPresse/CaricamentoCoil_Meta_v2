<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Viewer</title>

<style>
body{margin:0; overflow:hidden;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.125.2/examples/js/webxr/ARButton.js"></script>

</head>
<body>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

let renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

// 🔥 AR BUTTON (QUEST MR)
document.body.appendChild(THREE.ARButton.createButton(renderer,{
    requiredFeatures: ['hit-test']
}));

// LUCE
const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

// MODELLO
let model;
let mixer;
let actions = [];

const loader = new THREE.GLTFLoader();

loader.load("linea lunga_V4.glb",(gltf)=>{

model = gltf.scene;

const box = new THREE.Box3().setFromObject(model);
const center = box.getCenter(new THREE.Vector3());
model.position.sub(center);

const size = box.getSize(new THREE.Vector3()).length();
model.scale.setScalar(0.5 / size);

mixer = new THREE.AnimationMixer(model);

gltf.animations.forEach((clip)=>{
    actions.push(mixer.clipAction(clip));
});

});

// HIT TEST
let controller;
let hitTestSource = null;
let hitTestSourceRequested = false;

controller = renderer.xr.getController(0);
scene.add(controller);

// RETICOLO
const reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1,0.15,32),
    new THREE.MeshBasicMaterial({color:0x00ff00})
);
reticle.rotation.x = -Math.PI/2;
reticle.visible = false;
scene.add(reticle);

// POSIZIONAMENTO MODELLO
controller.addEventListener("select", ()=>{

if(reticle.visible && model){
    
    model.position.setFromMatrixPosition(reticle.matrix);
    scene.add(model);

}

});

// LOOP
const clock = new THREE.Clock();

renderer.setAnimationLoop((timestamp,frame)=>{

if(frame){

const referenceSpace = renderer.xr.getReferenceSpace();
const session = renderer.xr.getSession();

if(hitTestSourceRequested === false){

session.requestReferenceSpace('viewer').then((refSpace)=>{
    session.requestHitTestSource({space:refSpace}).then((source)=>{
        hitTestSource = source;
    });
});

session.addEventListener('end',()=>{
    hitTestSourceRequested = false;
    hitTestSource = null;
});

hitTestSourceRequested = true;
}

if(hitTestSource){

const hitTestResults = frame.getHitTestResults(hitTestSource);

if(hitTestResults.length){

const hit = hitTestResults[0];

const pose = hit.getPose(referenceSpace);

reticle.visible = true;
reticle.matrix.fromArray(pose.transform.matrix);

}else{
reticle.visible = false;
}

}

}

// animazioni
if(mixer){
    mixer.update(clock.getDelta());
}

renderer.render(scene,camera);

});

</script>

</body>
</html>
