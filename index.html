<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Industrial Viewer</title>

<style>
body{margin:0; overflow:hidden; background:#111;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/three.min.js"></script>
<script src="GLTFLoader.js"></script>

</head>
<body>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,5);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

// 🔥 BOTTONE XR
document.body.appendChild(THREE.WEBGL.isWebGLAvailable() ? 
    (function(){
        const button = document.createElement("button");
        button.innerHTML = "ENTER XR";
        button.style.position = "absolute";
        button.style.bottom = "20px";
        button.style.left = "20px";
        button.style.padding = "10px";
        button.onclick = () => renderer.xr.enabled = true;
        return button;
    })()
:null);

// LUCI
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

const light2 = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(light2);

// MODELLO
let model;
let mixer;
let actions = [];

const loader = new THREE.GLTFLoader();

loader.load("linea%20lunga_V4.glb",

function(gltf){

console.log("MODEL LOADED");

model = gltf.scene;

// CENTRO
const box = new THREE.Box3().setFromObject(model);
const center = box.getCenter(new THREE.Vector3());
model.position.sub(center);

// SCALA
const size = box.getSize(new THREE.Vector3()).length();
model.scale.setScalar(4 / size);

scene.add(model);

// ANIMAZIONI
mixer = new THREE.AnimationMixer(model);

gltf.animations.forEach((clip,i)=>{
    const action = mixer.clipAction(clip);
    actions.push(action);
});

},

undefined,

function(error){
console.error("MODEL ERROR:", error);
}

);

// 🎮 PANNELLO INDUSTRIALE XR

const panel = new THREE.Group();
panel.position.set(0,1.5,-2);
scene.add(panel);

function createButton(x, label, color){

const geo = new THREE.CylinderGeometry(0.15,0.15,0.05,32);
const mat = new THREE.MeshStandardMaterial({
    color: color,
    metalness:0.8,
    roughness:0.3
});

const btn = new THREE.Mesh(geo,mat);
btn.rotation.x = Math.PI/2;
btn.position.x = x;

panel.add(btn);

// LABEL
const canvas = document.createElement("canvas");
canvas.width = 256;
canvas.height = 128;
const ctx = canvas.getContext("2d");

ctx.fillStyle = "white";
ctx.font = "40px Arial";
ctx.fillText(label,20,60);

const texture = new THREE.CanvasTexture(canvas);
const matLabel = new THREE.MeshBasicMaterial({map:texture, transparent:true});

const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.2),matLabel);
plane.position.set(x,0.25,0);

panel.add(plane);

return btn;
}

// CREAZIONE PULSANTI

let btns = [];

btns.push(createButton(-1.2,"A1",0xff0000));
btns.push(createButton(-0.6,"A2",0x00ff00));
btns.push(createButton(0,"A3",0x0000ff));
btns.push(createButton(0.6,"A4",0xffff00));
btns.push(createButton(1.2,"A5",0xff00ff));

// RESET
const resetBtn = createButton(2,"RESET",0xffffff);
btns.push(resetBtn);

// INTERAZIONE (semplice raycast camera)

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", onClick);

function onClick(event){

mouse.x = (event.clientX / window.innerWidth)*2-1;
mouse.y = -(event.clientY / window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

const intersects = raycaster.intersectObjects(btns);

if(intersects.length > 0){

const clicked = intersects[0].object;
const index = btns.indexOf(clicked);

if(index === 5){
    resetAnimations();
}else{
    playAnimation(index);
}

}

}

// 🎬 CONTROLLO ANIMAZIONI

let playing = [];

function playAnimation(i){

if(!actions[i]) return;

if(playing[i]){
    actions[i].paused = true;
    playing[i] = false;
}else{
    actions[i].reset();
    actions[i].play();
    playing[i] = true;
}

}

function resetAnimations(){

actions.forEach(a=>{
    a.stop();
});

playing = [];

}

// LOOP

const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

if(mixer){
    mixer.update(clock.getDelta());
}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
