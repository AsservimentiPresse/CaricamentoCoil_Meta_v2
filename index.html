<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Viewer</title>

<style>
body{margin:0; overflow:hidden;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.125.2/examples/js/webxr/VRButton.js"></script>

</head>
<body>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,3);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

// 🔥 QUESTO È IL VERO XR BUTTON
document.body.appendChild(THREE.VRButton.createButton(renderer));

// LUCI
const light = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(light);

// MODELLO
let model;
let mixer;

const loader = new THREE.GLTFLoader();

loader.load("linea%20lunga_V4.glb",

function(gltf){

model = gltf.scene;

// centra
const box = new THREE.Box3().setFromObject(model);
const center = box.getCenter(new THREE.Vector3());
model.position.sub(center);

// scala
const size = box.getSize(new THREE.Vector3()).length();
model.scale.setScalar(2 / size);

// posiziona davanti
model.position.z = -2;

scene.add(model);

// animazioni
mixer = new THREE.AnimationMixer(model);
gltf.animations.forEach(clip=>{
    mixer.clipAction(clip).play();
});

},

undefined,
function(e){console.error(e);}

);

// LOOP XR (IMPORTANTISSIMO)
const clock = new THREE.Clock();

renderer.setAnimationLoop(()=>{

if(mixer){
    mixer.update(clock.getDelta());
}

renderer.render(scene,camera);

});

</script>

</body>
</html>
