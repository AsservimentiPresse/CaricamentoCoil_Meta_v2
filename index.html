<<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR MIXED REALITY</title>

<style>
body { margin: 0; overflow: hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";

const scene = new THREE.Scene();

// 🔥 IMPORTANTE: background trasparente per passthrough
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

// 🔥 QUEST PASSTHROUGH ENABLE
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);

// 🔥 BOTTONE AR (NON VR)
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"],
    optionalFeatures: ["dom-overlay"],
    domOverlay: { root: document.body }
}));

// LUCE (serve ancora anche in MR per shading)
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

// CUBO TEST
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.2,0.2),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);

cube.position.set(0, 0, -0.5);
scene.add(cube);

// HIT TEST (ancoraggio mondo reale base)
let hitTestSource = null;
let hitTestSourceRequested = false;

const controller = renderer.xr.getController(0);
scene.add(controller);

// LOOP
renderer.setAnimationLoop(function () {

    cube.rotation.y += 0.01;

    renderer.render(scene, camera);
});

</script>

</body>
</html>
