<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR FINAL BASE</title>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();

/* 🔥 QUESTO È CIÒ CHE ATTIVA MR */
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

/* 🔥 MR MODE */
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);

/* 🔥 QUEST 3 MR BUTTON */
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

/* LUCE (necessaria anche in MR) */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5,10,5);
scene.add(dirLight);

/* MODELLO GLB */
const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    const model = gltf.scene;
    scene.add(model);

    /* centra modello nello spazio reale */
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    /* scala realistica MR */
    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.5 / size);

    /* posizionamento davanti all’utente */
    model.position.z = -1;

});

/* LOOP MR */
renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
});

</script>

</body>
</html>
