<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - AR Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:sans-serif;
}

/* MODELLO */
model-viewer{
width:95vw;
height:75vh;
}

/* Pulsante AR */
model-viewer::part(default-ar-button){
width:110px;
height:110px;
border-radius:50%;
background:white;
color:black;
font-size:2rem;
}

/* SEZIONI CONTROLLI */

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls-section h3{
margin-right:15px;
font-size:1.6rem;
min-width:170px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:12px;
}

/* BOTTONI */

button{
padding:14px 24px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:1.1rem;
color:white;
min-width:110px;
transition:all 0.2s;
}

/* hover utile in VR browser */
button:hover{
transform:scale(1.08);
}

/* bottone attivo */
button.active{
outline:4px solid white;
transform:scale(1.1);
}

/* colori */

.green{background:green;}
.blue{background:blue;}
.yellow{background:yellow;color:black;}
.lightgray{background:lightgray;color:black;}
.darkgray{background:dimgray;}
.red{background:red;}
.orange{background:orange;}
.purple{background:purple;}

.reset{
background:#444;
}

</style>
</head>

<body>

<!-- MODEL VIEWER -->

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="0"
exposure="0.5"
alt="ASSIEME 3D Model">
</model-viewer>

<!-- ANIMAZIONI -->

<div class="controls-section">

<h3>Animations</h3>

<div class="controls">

<button id="anim0" class="blue" onclick="toggleAnimation(0)">Animazione 1</button>
<button id="anim1" class="green" onclick="toggleAnimation(1)">Animazione 2</button>
<button id="anim2" class="orange" onclick="toggleAnimation(2)">Animazione 3</button>
<button id="anim3" class="purple" onclick="toggleAnimation(3)">Animazione 4</button>
<button id="anim4" class="red" onclick="toggleAnimation(4)">Animazione 5</button>

<button class="reset" onclick="resetAnimations()">RESET</button>

</div>

</div>

<!-- STRUCTURE COLOR -->

<div class="controls-section">

<h3>Structure Color</h3>

<div class="controls">

<button class="green" onclick="changeColor(0,[0,0.1,0,1])">Verde</button>
<button class="blue" onclick="changeColor(0,[0,0,0.18,1])">Blu</button>
<button class="orange" onclick="changeColor(0,[1,0.12,0,1])">Arancio</button>
<button class="lightgray" onclick="changeColor(0,[0.55,0.55,0.55,1])">Grigio chiaro</button>
<button class="darkgray" onclick="changeColor(0,[0.25,0.25,0.25,1])">Grigio scuro</button>
<button class="red" onclick="changeColor(0,[0.22,0,0,1])">Rosso</button>

</div>

</div>

<!-- MOBILE PARTS COLOR -->

<div class="controls-section">

<h3>Mobile Parts Color</h3>

<div class="controls">

<button class="green" onclick="changeColor(2,[0,0.1,0,1])">Verde</button>
<button class="blue" onclick="changeColor(2,[0,0,1,1])">Blu</button>
<button class="yellow" onclick="changeColor(2,[1,1,0,1])">Giallo</button>
<button class="lightgray" onclick="changeColor(2,[0.55,0.55,0.55,1])">Grigio chiaro</button>
<button class="darkgray" onclick="changeColor(2,[0.33,0.33,0.33,1])">Grigio scuro</button>
<button class="red" onclick="changeColor(2,[1,0,0,1])">Rosso</button>

</div>

</div>

<script>

const modelViewer = document.querySelector("#viewer")

let animations=[]
let currentAnimation=null

/* CARICAMENTO MODELLO */

modelViewer.addEventListener("load",()=>{

animations=modelViewer.availableAnimations

})

/* TOGGLE ANIMAZIONI */

function toggleAnimation(index){

if(!animations[index]) return

const selectedAnimation=animations[index]

const button=document.getElementById("anim"+index)

/* stessa animazione */

if(currentAnimation===selectedAnimation){

if(modelViewer.paused){

modelViewer.play()
button.classList.add("active")

}else{

modelViewer.pause()
button.classList.remove("active")

}

}else{

clearActiveButtons()

currentAnimation=selectedAnimation

modelViewer.pause()
modelViewer.animationName=selectedAnimation
modelViewer.currentTime=0
modelViewer.play()

button.classList.add("active")

}

}

/* RESET */

function resetAnimations(){

modelViewer.pause()
modelViewer.currentTime=0

currentAnimation=null

clearActiveButtons()

}

/* RIMUOVE HIGHLIGHT BOTTONI */

function clearActiveButtons(){

for(let i=0;i<5;i++){

const b=document.getElementById("anim"+i)

if(b) b.classList.remove("active")

}

}

/* RESET AUTOMATICO QUANDO ENTRI IN AR */

modelViewer.addEventListener("ar-status",event=>{

if(event.detail.status==="session-started"){

resetAnimations()

}

})

/* COLORI MATERIALI */

function changeColor(materialIndex,rgba){

const material=modelViewer.model.materials[materialIndex]

if(material && material.pbrMetallicRoughness){

material.pbrMetallicRoughness.setBaseColorFactor(rgba)

}

}

</script>

</body>
</html>
