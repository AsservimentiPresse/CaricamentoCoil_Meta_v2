<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Clean Industrial v2</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// =====================
// LIGHT (più forte per colori vivi)
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x888888, 2.5));

const light = new THREE.DirectionalLight(0xffffff, 3);
light.position.set(5,10,5);
scene.add(light);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.2 / size);

    model.position.set(0, 0, -1);
});

// =====================
// CONTROLLERS
// =====================
const right = renderer.xr.getController(0);
const left = renderer.xr.getController(1);

scene.add(right);
scene.add(left);

// =====================
// STATE CLEAN
// =====================
let move = false;
let rotate = false;

let baseDistance = null;
let baseScale = 1;

// =====================
// DISTANCE
// =====================
function dist(a, b) {
    const p1 = new THREE.Vector3();
    const p2 = new THREE.Vector3();

    p1.setFromMatrixPosition(a.matrixWorld);
    p2.setFromMatrixPosition(b.matrixWorld);

    return p1.distanceTo(p2);
}

// =====================
// EVENTS CLEAN
// =====================

// RIGHT = MOVE
right.addEventListener("selectstart", () => move = true);
right.addEventListener("selectend", () => {
    move = false;
    baseDistance = null;
});

// LEFT = ROTATE
left.addEventListener("selectstart", () => rotate = true);
left.addEventListener("selectend", () => {
    rotate = false;
    baseDistance = null;
});

// =====================
// MODEL MOVE
// =====================
function updateMove() {

    if (!model) return;

    const p = new THREE.Vector3();
    p.setFromMatrixPosition(right.matrixWorld);

    model.position.lerp(p, 0.25);
}

// =====================
// MODEL ROTATE
// =====================
const last = new THREE.Vector3();

function updateRotate() {

    if (!model) return;

    const p = new THREE.Vector3();
    p.setFromMatrixPosition(left.matrixWorld);

    const dx = p.x - last.x;

    model.rotation.y += dx * 2.0;

    last.copy(p);
}

// =====================
// PINCH ZOOM FIXED (ONLY BOTH HANDS ACTIVE)
// =====================
function updateZoom() {

    if (!model) return;

    const both = move && rotate;

    if (!both) {
        baseDistance = null;
        return;
    }

    const d = dist(right, left);

    if (baseDistance === null) {
        baseDistance = d;
        baseScale = model.scale.x;
        return;
    }

    model.scale.setScalar(baseScale * (d / baseDistance));
}

// =====================
// UI ATTACHED TO MODEL (FIXED POSITION)
// =====================
const uiGroup = new THREE.Group();
scene.add(uiGroup);

const buttons = [];

function makeBtn(x, color, fn) {

    const b = new THREE.Mesh(
        new THREE.BoxGeometry(0.12,0.06,0.02),
        new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.4
        })
    );

    b.position.set(x, 0.6, -0.3);
    b.userData.fn = fn;

    uiGroup.add(b);
    buttons.push(b);

    return b;
}

// brighter colors (FIX)
makeBtn(-0.2, 0xff4444, () => {
    if (selected) selected.material.color.set(0xff4444);
});
makeBtn(0, 0x44ff44, () => {
    if (selected) selected.material.color.set(0x44ff44);
});
makeBtn(0.2, 0x4488ff, () => {
    if (selected) selected.material.color.set(0x4488ff);
});

// attach UI to model
function attachUI() {
    if (!model) return;
    uiGroup.position.copy(model.position);
    uiGroup.position.y += 0.5;
}

// =====================
// PICK SYSTEM
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

let selected = null;

function pick(controller) {

    if (!model) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObject(model, true);

    if (hits.length > 0) {
        selected = hits[0].object;
    }
}

// UI CLICK
function click(controller) {

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObjects(buttons);

    if (hits.length > 0) {
        hits[0].object.userData.fn?.();
    } else {
        pick(controller);
    }
}

// =====================
// CONTROLLER EVENTS FIXED
// =====================
right.addEventListener("select", () => click(right));
left.addEventListener("select", () => click(left));

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

    if (move) updateMove();
    if (rotate) updateRotate();

    updateZoom();
    attachUI();

    renderer.render(scene, camera);
});

</script>

</body>
</html>
