<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ASSIEME XR Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
}

/* MODEL VIEWER FULLSCREEN */

model-viewer{
width:100vw;
height:100vh;
background:#000;
}

/* AR BUTTON */

model-viewer::part(default-ar-button){
width:110px;
height:110px;
border-radius:50%;
background:white;
}

/* HOTSPOT BUTTON */

.hotspot{

width:70px;
height:70px;

border-radius:50%;
border:none;

background:#1e1e1e;
color:white;

font-size:20px;
font-weight:bold;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:
0 0 10px rgba(0,0,0,0.8),
0 0 20px rgba(0,150,255,0.6);

}

.hotspot.active{

background:#00aaff;

box-shadow:
0 0 25px rgba(0,200,255,1);

}

/* COLOR BUTTON */

.colorButton{

width:50px;
height:50px;

border-radius:50%;
border:none;

cursor:pointer;

}

.green{background:green;}
.blue{background:blue;}
.yellow{background:yellow;}
.lightgray{background:lightgray;}
.darkgray{background:dimgray;}
.red{background:red;}
.orange{background:orange;}

</style>
</head>

<body>

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
shadow-intensity="0"
exposure="0.5">

<!-- ANIMAZIONI -->

<button slot="hotspot-a1"
class="hotspot"
data-position="-0.25m 0.35m 0.25m"
onclick="toggleAnimation(0)"
id="anim0">1</button>

<button slot="hotspot-a2"
class="hotspot"
data-position="-0.12m 0.35m 0.25m"
onclick="toggleAnimation(1)"
id="anim1">2</button>

<button slot="hotspot-a3"
class="hotspot"
data-position="0m 0.35m 0.25m"
onclick="toggleAnimation(2)"
id="anim2">3</button>

<button slot="hotspot-a4"
class="hotspot"
data-position="0.12m 0.35m 0.25m"
onclick="toggleAnimation(3)"
id="anim3">4</button>

<button slot="hotspot-a5"
class="hotspot"
data-position="0.25m 0.35m 0.25m"
onclick="toggleAnimation(4)"
id="anim4">5</button>

<!-- RESET -->

<button slot="hotspot-reset"
class="hotspot"
data-position="0m 0.2m -0.25m"
onclick="resetAnimations()">R</button>

<!-- COLORI STRUTTURA -->

<button slot="hotspot-c1"
class="colorButton green"
data-position="-0.25m 0.1m 0.25m"
onclick="changeColor(0,[0,0.1,0,1])"></button>

<button slot="hotspot-c2"
class="colorButton blue"
data-position="-0.15m 0.1m 0.25m"
onclick="changeColor(0,[0,0,0.18,1])"></button>

<button slot="hotspot-c3"
class="colorButton orange"
data-position="-0.05m 0.1m 0.25m"
onclick="changeColor(0,[1,0.12,0,1])"></button>

<button slot="hotspot-c4"
class="colorButton lightgray"
data-position="0.05m 0.1m 0.25m"
onclick="changeColor(0,[0.55,0.55,0.55,1])"></button>

<button slot="hotspot-c5"
class="colorButton darkgray"
data-position="0.15m 0.1m 0.25m"
onclick="changeColor(0,[0.25,0.25,0.25,1])"></button>

<button slot="hotspot-c6"
class="colorButton red"
data-position="0.25m 0.1m 0.25m"
onclick="changeColor(0,[0.22,0,0,1])"></button>

</model-viewer>

<script>

const viewer=document.querySelector("#viewer")

let animations=[]
let currentAnimation=null

viewer.addEventListener("load",()=>{

animations=viewer.availableAnimations

})

function toggleAnimation(index){

if(!animations[index]) return

const anim=animations[index]
const button=document.getElementById("anim"+index)

if(currentAnimation===anim){

if(viewer.paused){

viewer.play()
button.classList.add("active")

}else{

viewer.pause()
button.classList.remove("active")

}

}else{

clearButtons()

currentAnimation=anim

viewer.animationName=anim
viewer.play()

button.classList.add("active")

}

}

function resetAnimations(){

viewer.pause()
viewer.currentTime=0

currentAnimation=null

clearButtons()

}

function clearButtons(){

for(let i=0;i<5;i++){

const b=document.getElementById("anim"+i)

if(b) b.classList.remove("active")

}

}

function changeColor(materialIndex,rgba){

const material=viewer.model.materials[materialIndex]

if(material && material.pbrMetallicRoughness){

material.pbrMetallicRoughness.setBaseColorFactor(rgba)

}

}

</script>

</body>
</html>
