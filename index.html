<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Stable + Radial Menu FIX</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"]}));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));

// =====================
// MODEL
// =====================
let model;

new GLTFLoader().load("linea%20lunga_V4.glb",(gltf)=>{

  model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3()).length();

  model.scale.setScalar(1.5 / size);
  model.position.set(0,0,-1);

});

// =====================
// CONTROLLERS
// =====================
const c0 = renderer.xr.getController(0); // destra
const c1 = renderer.xr.getController(1); // sinistra

scene.add(c0);
scene.add(c1);

// =====================
// MOVE / ROTATE / SCALE (UNCHANGED LOGIC SAFE)
// =====================
let move = false;
let rotate = false;
let pinch = false;

let baseDist = null;
let baseScale = 1;

const raycaster = new THREE.Raycaster();
const tmpMat = new THREE.Matrix4();

c0.addEventListener("selectstart",()=>{ move=true; });
c0.addEventListener("selectend",()=>{ move=false; baseDist=null; });

c1.addEventListener("selectstart",()=>{ rotate=true; openMenu(); });
c1.addEventListener("selectend",()=>{ rotate=false; baseDist=null; });

// =====================
// MOVE
// =====================
function updateMove(){

  if(!model || !move) return;

  tmpMat.identity().extractRotation(c0.matrixWorld);

  const dir = new THREE.Vector3(0,0,-1).applyMatrix4(tmpMat);
  const origin = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);

  const target = origin.clone().add(dir.multiplyScalar(1.2));

  model.position.lerp(target,0.25);
}

// =====================
// ROTATE
// =====================
const last = new THREE.Vector3();

function updateRotate(){

  if(!model || !rotate) return;

  const p = new THREE.Vector3().setFromMatrixPosition(c1.matrixWorld);

  model.rotation.y += (p.x - last.x)*2;

  last.copy(p);
}

// =====================
// SCALE PINCH
// =====================
function updateScale(){

  if(!model) return;

  const a = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);
  const b = new THREE.Vector3().setFromMatrixPosition(c1.matrixWorld);

  const d = a.distanceTo(b);

  if(baseDist===null){
    baseDist=d;
    baseScale=model.scale.x;
  }

  model.scale.setScalar(baseScale*(d/baseDist));
}

// =====================
// RADIAL MENU
// =====================
const menu = new THREE.Group();
scene.add(menu);
menu.visible = false;

// buttons
const buttons = [];

function createButton(angle,color,name){

  const m = new THREE.Mesh(
    new THREE.CircleGeometry(0.05,32),
    new THREE.MeshStandardMaterial({
      color,
      emissive:color,
      emissiveIntensity:0.3
    })
  );

  m.position.set(Math.cos(angle)*0.18, Math.sin(angle)*0.18, 0);
  m.userData.name = name;

  menu.add(m);
  buttons.push(m);
}

createButton(0,0xff0000,"red");
createButton(1.2,0x00ff00,"green");
createButton(2.4,0x0000ff,"blue");
createButton(3.6,0xffff00,"yellow");
createButton(4.8,0xff00ff,"purple");

// =====================
// MENU POSITION
// =====================
function updateMenu(){

  const p = new THREE.Vector3().setFromMatrixPosition(c1.matrixWorld);
  menu.position.copy(p);

  menu.lookAt(camera.position);
}

// =====================
// OPEN MENU
// =====================
function openMenu(){
  menu.visible = !menu.visible;
}

// =====================
// RAYCAST MENU INTERACTION
// =====================
function handleMenu(){

  if(!menu.visible || !model) return;

  const origin = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);
  const dir = new THREE.Vector3(0,0,-1).applyMatrix4(c0.matrixWorld);

  raycaster.set(origin,dir);

  const hit = raycaster.intersectObjects(buttons);

  // reset hover
  buttons.forEach(b=>{
    b.material.emissiveIntensity = 0.3;
  });

  if(hit.length){

    const obj = hit[0].object;

    obj.material.emissiveIntensity = 1.2;

    // CLICK (select pressed)
    if(c0.userData.isSelecting){

      const c = obj.userData.name;

      model.traverse(o=>{
        if(o.isMesh){
          if(c==="red") o.material.color.set(0xff0000);
          if(c==="green") o.material.color.set(0x00ff00);
          if(c==="blue") o.material.color.set(0x0000ff);
          if(c==="yellow") o.material.color.set(0xffff00);
          if(c==="purple") o.material.color.set(0xff00ff);
        }
      });
    }
  }
}

// detect click state
c0.addEventListener("selectstart",()=>{ c0.userData.isSelecting=true; });
c0.addEventListener("selectend",()=>{ c0.userData.isSelecting=false; });

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

  updateMove();
  updateRotate();
  updateScale();

  if(menu.visible){
    updateMenu();
    handleMenu();
  }

  renderer.render(scene,camera);
});

</script>

</body>
</html>
