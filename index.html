<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - AR Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
margin: 0;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
color: white;
font-family: sans-serif;
}

model-viewer {
width: 95vw;
height: 75vh;
}

/* Pulsante AR */
model-viewer::part(default-ar-button) {
width: 100px;
height: 100px;
border-radius: 50%;
background-color: white;
color: black;
font-size: 2rem;
}

/* Sezione controlli */
.controls-section {
display: flex;
align-items: center;
margin: 10px 0;
width: 95vw;
}

.controls-section h3 {
margin-right: 15px;
font-size: 1.5rem;
min-width: 160px;
}

.controls {
display: flex;
flex-wrap: wrap;
gap: 10px;
}

button {
padding: 10px 20px;
border: none;
border-radius: 12px;
cursor: pointer;
font-size: 1rem;
color: white;
min-width: 80px;
}

.green { background: green; }
.blue { background: blue; }
.yellow { background: yellow; color: gray;}
.lightgray { background: lightgray; color: black; }
.darkgray { background: dimgray; }
.red { background: red; }
.orange { background: orange; color: white;}
.purple { background: purple; }
</style>
</head>

<body>

<!-- MODEL VIEWER -->
<model-viewer id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="0"
exposure="0.5"
alt="ASSIEME 3D Model">
</model-viewer>

<!-- CONTROLLO ANIMAZIONI -->
<div class="controls-section">
<h3>Animations</h3>
<div class="controls">

<button class="blue" onclick="playAnimation(0)">Animazione 1</button>
<button class="green" onclick="playAnimation(1)">Animazione 2</button>
<button class="orange" onclick="playAnimation(2)">Animazione 3</button>
<button class="purple" onclick="playAnimation(3)">Animazione 4</button>
<button class="red" onclick="playAnimation(4)">Animazione 5</button>

</div>
</div>

<!-- STRUCTURE COLOR -->
<div class="controls-section">
<h3>Structure Color</h3>
<div class="controls">
<button class="green" onclick="changeColor(0, [0, 0.1, 0, 1])">Verde</button>
<button class="blue" onclick="changeColor(0, [0, 0, 0.18, 1])">Blu</button>
<button class="orange" onclick="changeColor(0, [1, 0.12, 0, 1])">Arancio</button>
<button class="lightgray" onclick="changeColor(0, [0.55, 0.55, 0.55, 1])">Grigio chiaro</button>
<button class="darkgray" onclick="changeColor(0, [0.25, 0.25, 0.25, 1])">Grigio scuro</button>
<button class="red" onclick="changeColor(0, [0.22, 0, 0, 1])">Rosso</button>
</div>
</div>

<!-- MOBILE PARTS COLOR -->
<div class="controls-section">
<h3>Mobile Parts Color</h3>
<div class="controls">
<button class="green" onclick="changeColor(2, [0, 0.1, 0, 1])">Verde</button>
<button class="blue" onclick="changeColor(2, [0, 0, 1, 1])">Blu</button>
<button class="yellow" onclick="changeColor(2, [1, 1, 0, 1])">Giallo</button>
<button class="lightgray" onclick="changeColor(2, [0.55, 0.55, 0.55, 1])">Grigio chiaro</button>
<button class="darkgray" onclick="changeColor(2, [0.33, 0.33, 0.33, 1])">Grigio scuro</button>
<button class="red" onclick="changeColor(2, [1, 0, 0, 1])">Rosso</button>
</div>
</div>

<script>

const modelViewer = document.querySelector('#viewer');
let animations = [];

/* Carica animazioni dal modello */
modelViewer.addEventListener('load', () => {

animations = modelViewer.availableAnimations;

if (animations.length > 0) {
modelViewer.animationName = animations[0];
}

});

/* Riproduce animazione specifica */
function playAnimation(index) {

if (!animations[index]) return;

modelViewer.pause();
modelViewer.animationName = animations[index];
modelViewer.currentTime = 0;
modelViewer.play();

}

/* Cambio colore materiali */
function changeColor(materialIndex, rgba) {

const material = modelViewer.model.materials[materialIndex];

if (material && material.pbrMetallicRoughness) {
material.pbrMetallicRoughness.setBaseColorFactor(rgba);
}

}

</script>

</body>
</html>
