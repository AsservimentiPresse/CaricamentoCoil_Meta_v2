<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Stable + Simple Colors</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  innerWidth / innerHeight,
  0.01,
  40
);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(
  ARButton.createButton(renderer,{ requiredFeatures:["hit-test"]})
);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
const dir = new THREE.DirectionalLight(0xffffff,1.5);
dir.position.set(5,10,5);
scene.add(dir);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

  model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3()).length();

  model.scale.setScalar(1.5 / size);
  model.position.set(0,0,-1);

});

// =====================
// CONTROLLERS
// =====================
const c0 = renderer.xr.getController(0); // right
const c1 = renderer.xr.getController(1); // left

scene.add(c0);
scene.add(c1);

// =====================
// MOVE / ROTATE / SCALE (UNCHANGED)
// =====================
let move=false;
let rotate=false;
let pinch=false;

let baseDist=null;
let baseScale=1;

const tmp = new THREE.Matrix4();

// MOVE
c0.addEventListener("selectstart",()=> move=true);
c0.addEventListener("selectend",()=>{ move=false; baseDist=null; });

// ROTATE
c1.addEventListener("selectstart",()=> rotate=true);
c1.addEventListener("selectend",()=> rotate=false);

// =====================
// MOVE
// =====================
function updateMove(){

  if(!model || !move) return;

  tmp.identity().extractRotation(c0.matrixWorld);

  const dir = new THREE.Vector3(0,0,-1).applyMatrix4(tmp);
  const origin = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);

  const target = origin.clone().add(dir.multiplyScalar(1.2));

  model.position.lerp(target,0.25);
}

// =====================
// ROTATE
// =====================
const last = new THREE.Vector3();

function updateRotate(){

  if(!model || !rotate) return;

  const p = new THREE.Vector3().setFromMatrixPosition(c1.matrixWorld);

  model.rotation.y += (p.x - last.x)*2;

  last.copy(p);
}

// =====================
// SCALE PINCH
// =====================
function updateScale(){

  if(!model) return;

  const a = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);
  const b = new THREE.Vector3().setFromMatrixPosition(c1.matrixWorld);

  const d = a.distanceTo(b);

  if(baseDist===null){
    baseDist=d;
    baseScale=model.scale.x;
  }

  model.scale.setScalar(baseScale*(d/baseDist));
}

// =====================
// SIMPLE COLOR BUTTONS (FIXED IN SPACE)
// =====================
const colors = [
  { c:0xff0000, name:"red", pos:[-0.3,1.2,-1] },
  { c:0x00ff00, name:"green", pos:[0,1.2,-1] },
  { c:0x0000ff, name:"blue", pos:[0.3,1.2,-1] }
];

const buttons = [];

colors.forEach(col=>{

  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.05,16,16),
    new THREE.MeshStandardMaterial({
      color:col.c,
      emissive:col.c,
      emissiveIntensity:0.4
    })
  );

  m.position.set(...col.pos);
  m.userData.color = col.c;

  scene.add(m);
  buttons.push(m);
});

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();

// CLICK STATE
c0.userData.down = false;

c0.addEventListener("selectstart",()=> c0.userData.down=true);
c0.addEventListener("selectend",()=> c0.userData.down=false);

// =====================
// COLOR PICK LOGIC
// =====================
function updateColorPick(){

  if(!model) return;

  const origin = new THREE.Vector3().setFromMatrixPosition(c0.matrixWorld);
  const dir = new THREE.Vector3(0,0,-1).applyMatrix4(c0.matrixWorld);

  raycaster.set(origin,dir);

  const hit = raycaster.intersectObjects(buttons);

  // reset glow
  buttons.forEach(b=>{
    b.material.emissiveIntensity=0.4;
  });

  if(hit.length){

    const obj = hit[0].object;
    obj.material.emissiveIntensity=1.2;

    // CLICK
    if(c0.userData.down){

      const color = obj.userData.color;

      model.traverse(o=>{
        if(o.isMesh){
          o.material.color.set(color);
        }
      });
    }
  }
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

  updateMove();
  updateRotate();
  updateScale();
  updateColorPick();

  renderer.render(scene,camera);
});

</script>

</body>
</html>
