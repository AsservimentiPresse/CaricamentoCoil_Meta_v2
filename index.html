<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Mode System Fixed</title>

<style>
body { margin:0; overflow:hidden; }

.modeUI {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:10;
}

.btn {
    padding:10px 14px;
    border-radius:10px;
    background:#222;
    color:white;
    font-family:sans-serif;
    cursor:pointer;
    border:2px solid transparent;
}

.btn.active {
    border:2px solid #00ffcc;
    background:#0a0a0a;
}
</style>
</head>

<body>

<div class="modeUI">
    <div class="btn active" id="moveBtn">MOVE</div>
    <div class="btn" id="rotateBtn">ROTATE</div>
    <div class="btn" id="zoomBtn">ZOOM</div>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();
loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5 / size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0);
scene.add(controller1);

// =====================
// MODE SYSTEM
// =====================
let mode = "move";

// UI buttons
const moveBtn = document.getElementById("moveBtn");
const rotateBtn = document.getElementById("rotateBtn");
const zoomBtn = document.getElementById("zoomBtn");

function setMode(m){

    mode = m;

    moveBtn.classList.remove("active");
    rotateBtn.classList.remove("active");
    zoomBtn.classList.remove("active");

    if(m==="move") moveBtn.classList.add("active");
    if(m==="rotate") rotateBtn.classList.add("active");
    if(m==="zoom") zoomBtn.classList.add("active");
}

moveBtn.onclick = () => setMode("move");
rotateBtn.onclick = () => setMode("rotate");
zoomBtn.onclick = () => setMode("zoom");

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// =====================
// MOVE
// =====================
function moveModel(){

    if(!model) return;

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const target = new THREE.Vector3();
    raycaster.ray.at(1.5,target);

    model.position.lerp(target,0.2);
}

// =====================
// ROTATE
// =====================
const lastPos = new THREE.Vector3();

function rotateModel(){

    if(!model) return;

    const p = new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);

    const dx = p.x - lastPos.x;

    model.rotation.y += dx * 2;

    lastPos.copy(p);
}

// =====================
// ZOOM (PINCH)
// =====================
let baseDist=null;
let baseScale=1;

function zoomModel(){

    if(!model) return;

    const p1 = new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const p2 = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    const d = p1.distanceTo(p2);

    if(baseDist===null){
        baseDist=d;
        baseScale=model.scale.x;
    }

    model.scale.setScalar(baseScale*(d/baseDist));
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    if(mode==="move") moveModel();
    if(mode==="rotate") rotateModel();
    if(mode==="zoom") zoomModel();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
