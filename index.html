<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR GLB STABLE</title>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/VRButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// LUCI (IMPORTANTISSIMO per GLB industriali)
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5,10,5);
scene.add(dirLight);

// MODELLO GLB
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // centra modello
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    // scala industriale corretta
    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(2 / size);

});

// XR CONTROLLER (BASE SICURA)
const controller = renderer.xr.getController(0);
scene.add(controller);

// LOOP
renderer.setAnimationLoop(() => {

    renderer.render(scene, camera);

});

</script>

</body>
</html>
