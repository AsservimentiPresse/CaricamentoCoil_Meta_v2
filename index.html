<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Stable Full System FIX</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
scene.add(new THREE.DirectionalLight(0xffffff,2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

    model=gltf.scene;
    scene.add(model);

    const box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5/size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// =====================
// 🔦 LASERS + CURSORS (FIXED)
// =====================
function makeLaser(color){

    const geo=new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);

    const line=new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({color})
    );

    line.scale.z=10;

    return line;
}

controller0.add(makeLaser(0xff0000));
controller1.add(makeLaser(0x00ff00));

// cursori visivi reali
function addCursor(c,color){

    const m=new THREE.Mesh(
        new THREE.SphereGeometry(0.008,8,8),
        new THREE.MeshBasicMaterial({color})
    );

    m.position.set(0,0,-0.1);
    c.add(m);
}

addCursor(controller0,0xff4444);
addCursor(controller1,0x44ff44);

// impact dot
const impactDot=new THREE.Mesh(
    new THREE.SphereGeometry(0.01,12,12),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(impactDot);

// =====================
// UI MODE SYSTEM
// =====================
const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

let mode="move";
let frozen=false;

// =====================
// MODE UI (MR)
// =====================
const modes=["move","rotate","zoom","lock"];
const modeUI=[];

for(let i=0;i<modes.length;i++){

    const m=new THREE.Mesh(
        new THREE.BoxGeometry(0.08,0.08,0.08),
        new THREE.MeshStandardMaterial({color:0x333333})
    );

    m.position.set(-0.3 + i*0.18, 1.05, -0.6);

    m.userData.mode=modes[i];

    scene.add(m);
    modeUI.push(m);
}

// =====================
// MODE SELECT
// =====================
function setMode(m){

    if(m==="lock"){
        frozen=!frozen;
        return;
    }

    mode=m;
}

// =====================
// UI INTERACTION (RIGHT HAND)
// =====================
function updateUI(){

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits=raycaster.intersectObjects(modeUI);

    modeUI.forEach(b=>b.material.color.set(0x333333));

    if(hits.length){

        const obj=hits[0].object;
        obj.material.color.set(0x00ffcc);

        impactDot.position.copy(hits[0].point);

        if(controller0.userData.selecting){
            setMode(obj.userData.mode);
        }

    } else {
        impactDot.position.set(0,-999,0);
    }
}

controller0.addEventListener("selectstart",()=>controller0.userData.selecting=true);
controller0.addEventListener("selectend",()=>controller0.userData.selecting=false);

// =====================
// MOVE
// =====================
function move(){

    if(!model || frozen) return;

    const p=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);
    model.position.lerp(new THREE.Vector3(p.x,p.y,p.z-1),0.2);
}

// =====================
// ROTATE
// =====================
const last=new THREE.Vector3();

function rotate(){

    if(!model || frozen) return;

    const p=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    model.rotation.y += (p.x-last.x)*2;

    last.copy(p);
}

// =====================
// ZOOM
// =====================
let baseD=null, baseS=1;

function zoom(){

    if(!model || frozen) return;

    const p1=new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const p2=new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    const d=p1.distanceTo(p2);

    if(baseD===null){
        baseD=d;
        baseS=model.scale.x;
    }

    model.scale.setScalar(baseS*(d/baseD));
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    updateUI();

    if(mode==="move") move();
    if(mode==="rotate") rotate();
    if(mode==="zoom") zoom();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
