<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR INTERACTIVE</title>

<style>
body { margin: 0; overflow: hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// LUCE
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

// 🎯 OGGETTI INTERATTIVI
const objects = [];

function createButton(x, label, color) {

    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.08, 0.08),
        new THREE.MeshStandardMaterial({ color })
    );

    mesh.position.set(x, 1.3, -0.5);
    mesh.userData.label = label;

    scene.add(mesh);
    objects.push(mesh);

    return mesh;
}

createButton(-0.3, "A1", 0xff0000);
createButton(-0.15, "A2", 0x00ff00);
createButton(0, "A3", 0x0000ff);
createButton(0.15, "A4", 0xffff00);
createButton(0.3, "A5", 0xff00ff);

// 🎮 CONTROLLER XR
const controller = renderer.xr.getController(0);
scene.add(controller);

// 🔥 RAY VISIVO (PUNTATORE)
const geometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
]);

const line = new THREE.Line(
    geometry,
    new THREE.LineBasicMaterial({ color: 0xff0000 })
);

line.name = "ray";
controller.add(line);

// 🎯 RAYCAST LOGIC
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

controller.addEventListener("selectstart", onSelect);

function onSelect() {

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

    const intersects = raycaster.intersectObjects(objects);

    if (intersects.length > 0) {

        const obj = intersects[0].object;

        // 🔥 CAMBIO COLORE
        obj.material.color.set(Math.random() * 0xffffff);
    }
}

// 🔁 LOOP
renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
});

</script>

</body>
</html>
