<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Industrial Viewer FIX</title>

<style>
body { margin: 0; overflow: hidden; background: #111; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/examples/js/VRButton.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 5);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// LIGHTS
scene.add(new THREE.DirectionalLight(0xffffff, 2).position.set(5,10,5));
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// MODEL
let model;
let mixer;
let actions = [];

const loader = new THREE.GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(4 / size);

    scene.add(model);

    mixer = new THREE.AnimationMixer(model);

    gltf.animations.forEach((clip) => {
        actions.push(mixer.clipAction(clip));
    });

});

// PANEL
const panel = new THREE.Group();
panel.position.set(0, 1.5, -2);
scene.add(panel);

function createButton(x, label, color) {

    const geo = new THREE.CylinderGeometry(0.15, 0.15, 0.05, 32);
    const mat = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.8,
        roughness: 0.3
    });

    const btn = new THREE.Mesh(geo, mat);
    btn.rotation.x = Math.PI / 2;
    btn.position.x = x;

    panel.add(btn);

    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 128;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(label, 20, 70);

    const tex = new THREE.CanvasTexture(canvas);

    const labelMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.4, 0.2),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true })
    );

    labelMesh.position.set(x, 0.25, 0);
    panel.add(labelMesh);

    return btn;
}

let btns = [];

btns.push(createButton(-1.2, "A1", 0xff0000));
btns.push(createButton(-0.6, "A2", 0x00ff00));
btns.push(createButton(0, "A3", 0x0000ff));
btns.push(createButton(0.6, "A4", 0xffff00));
btns.push(createButton(1.2, "A5", 0xff00ff));

const resetBtn = createButton(2, "RESET", 0xffffff);
btns.push(resetBtn);

// XR CONTROLLERS
const controller = renderer.xr.getController(0);
scene.add(controller);

const raycaster = new THREE.Raycaster();

controller.addEventListener("selectstart", onSelect);

function onSelect() {

    const tempMatrix = new THREE.Matrix4();
    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

    const intersects = raycaster.intersectObjects(btns);

    if (intersects.length > 0) {

        const clicked = intersects[0].object;
        const index = btns.indexOf(clicked);

        if (index === btns.length - 1) {
            resetAnimations();
        } else {
            playAnimation(index);
        }
    }
}

// ANIMATIONS
let playing = [];

function playAnimation(i) {

    if (!actions[i]) return;

    if (playing[i]) {
        actions[i].paused = true;
        playing[i] = false;
    } else {
        actions[i].reset();
        actions[i].play();
        playing[i] = true;
    }
}

function resetAnimations() {

    actions.forEach(a => a.stop());
    playing = [];
}

// LOOP
const clock = new THREE.Clock();

function animate() {

    renderer.setAnimationLoop(() => {

        if (mixer) mixer.update(clock.getDelta());

        renderer.render(scene, camera);
    });
}

animate();

</script>

</body>
</html>
