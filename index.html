<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Fixed Industrial UI</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// =====================
// LIGHT
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.2 / size);

    model.position.set(0, 0, -1);
});

// =====================
// RETICLE (floor anchor)
// =====================
let reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.08, 0.1, 32),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
);

reticle.rotation.x = -Math.PI / 2;
reticle.visible = false;
scene.add(reticle);

// =====================
// CONTROLLER
// =====================
const controller = renderer.xr.getController(0);
scene.add(controller);

// =====================
// RAYCASTER
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// =====================
// UI GROUP
// =====================
const uiGroup = new THREE.Group();
scene.add(uiGroup);

// UI BUTTONS
const uiButtons = [];

function createButton(label, x, color, onClick) {

    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.06, 0.02),
        new THREE.MeshStandardMaterial({ color })
    );

    mesh.position.set(x, 1.2, -0.8);
    mesh.userData.clickable = true;
    mesh.userData.onClick = onClick;

    uiGroup.add(mesh);
    uiButtons.push(mesh);

    return mesh;
}

// =====================
// UI ACTIONS
// =====================
let selected = null;

createButton("RED", -0.25, 0xff0000, () => {
    if (selected) selected.material.color.set(0xff0000);
});

createButton("GREEN", 0, 0x00ff00, () => {
    if (selected) selected.material.color.set(0x00ff00);
});

createButton("BLUE", 0.25, 0x0000ff, () => {
    if (selected) selected.material.color.set(0x0000ff);
});

// =====================
// PICK MODEL PART
// =====================
function pickModel() {

    if (!model) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObject(model, true);

    if (hits.length > 0) {
        selected = hits[0].object;
    }
}

// =====================
// CLICK UI OR MODEL
// =====================
function handleClick() {

    // 1) check UI first
    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const uiHits = raycaster.intersectObjects(uiButtons);

    if (uiHits.length > 0) {
        uiHits[0].object.userData.onClick?.();
        return;
    }

    // 2) otherwise pick model
    pickModel();
}

// =====================
// MOVE MODEL
// =====================
let dragging = false;

controller.addEventListener("selectstart", () => dragging = true);
controller.addEventListener("selectend", () => dragging = false);
controller.addEventListener("select", handleClick);

function moveModel() {

    if (!model) return;

    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(controller.matrixWorld);

    model.position.lerp(pos, 0.2);
}

// =====================
// HIT TEST (floor placement)
// =====================
let hitTestSource = null;
let hitTestRequested = false;

renderer.setAnimationLoop((_, frame) => {

    const session = renderer.xr.getSession();

    if (session && !hitTestRequested) {

        session.requestReferenceSpace("viewer").then(refSpace => {
            session.requestHitTestSource({ space: refSpace }).then(source => {
                hitTestSource = source;
            });
        });

        hitTestRequested = true;
    }

    if (hitTestSource && frame) {

        const refSpace = renderer.xr.getReferenceSpace();
        const hits = frame.getHitTestResults(hitTestSource);

        if (hits.length > 0) {

            const pose = hits[0].getPose(refSpace);

            reticle.visible = true;
            reticle.position.set(
                pose.transform.position.x,
                pose.transform.position.y,
                pose.transform.position.z
            );
        }
    }

    if (dragging) {
        moveModel();
    }

    renderer.render(scene, camera);
});

</script>

</body>
</html>
