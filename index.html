<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>XR Machine Controller</title>

<style>
body{
margin:0;
overflow:hidden;
}
canvas{
display:block;
}
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { XRControllerModelFactory } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/XRControllerModelFactory.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js";

let scene,camera,renderer;
let controller1;
let raycaster = new THREE.Raycaster();

let model;
let mixer;
let actions=[];
let buttons=[];

init();
animate();

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

camera.position.set(0,1.6,3);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const light = new THREE.HemisphereLight(0xffffff,0x444444);
light.position.set(0,20,0);
scene.add(light);

const loader = new GLTFLoader();

loader.load("linea lunga PROVA ANIMAZIONI.glb", gltf=>{

model = gltf.scene;
scene.add(model);

mixer = new THREE.AnimationMixer(model);

gltf.animations.forEach((clip)=>{
actions.push(mixer.clipAction(clip));
});

});

createButtons();

controller1 = renderer.xr.getController(0);
controller1.addEventListener("selectstart", onSelect);
scene.add(controller1);

const controllerModelFactory = new XRControllerModelFactory();

const controllerGrip = renderer.xr.getControllerGrip(0);
controllerGrip.add(
controllerModelFactory.createControllerModel(controllerGrip)
);
scene.add(controllerGrip);

}

function createButtons(){

const geometry = new THREE.CylinderGeometry(0.08,0.08,0.02,32);

for(let i=0;i<5;i++){

const material = new THREE.MeshStandardMaterial({
color:0x0088ff
});

const button = new THREE.Mesh(geometry,material);

button.position.set(i*0.2-0.4,1.2,-0.5);
button.rotation.x = -Math.PI/2;

button.userData.index = i;

scene.add(button);
buttons.push(button);

}

}

function onSelect(){

const tempMatrix = new THREE.Matrix4();
tempMatrix.identity().extractRotation(controller1.matrixWorld);

raycaster.ray.origin.setFromMatrixPosition(controller1.matrixWorld);
raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

const intersects = raycaster.intersectObjects(buttons);

if(intersects.length>0){

const i = intersects[0].object.userData.index;

playAnimation(i);

}

}

function playAnimation(i){

if(!actions[i]) return;

actions.forEach(a=>a.stop());

actions[i].reset();
actions[i].play();

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(mixer) mixer.update(0.016);

renderer.render(scene,camera);

}

</script>

</body>
</html>
