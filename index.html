<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Full Interaction + Real Laser</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
scene.add(new THREE.DirectionalLight(0xffffff,2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5/size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// =====================
// 🔦 LASER VISUAL (REAL)
// =====================
function createLaser(color){

    const geo = new THREE.BufferGeometry();
    const points = [
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ];

    geo.setFromPoints(points);

    const line = new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({ color })
    );

    line.scale.z = 10; // lunghezza laser

    return line;
}

const laser0 = createLaser(0xff0000);
const laser1 = createLaser(0x00ff00);

controller0.add(laser0);
controller1.add(laser1);

// =====================
// 🎯 IMPACT DOT
// =====================
const dotGeo = new THREE.SphereGeometry(0.01,12,12);
const dotMat = new THREE.MeshBasicMaterial({ color:0xffffff });
const impactDot = new THREE.Mesh(dotGeo,dotMat);
scene.add(impactDot);

// =====================
// UI
// =====================
const ui=[];
const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

// colors
const colors=[0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff];

for(let i=0;i<colors.length;i++){

    const m=new THREE.Mesh(
        new THREE.SphereGeometry(0.05,16,16),
        new THREE.MeshStandardMaterial({
            color:colors[i],
            emissive:colors[i],
            emissiveIntensity:0.5
        })
    );

    m.position.set(-0.3+i*0.15,1.2,-0.6);
    m.userData.type="color";
    m.userData.color=colors[i];

    scene.add(m);
    ui.push(m);
}

// =====================
// MODE
// =====================
let mode="move";

// =====================
// UI RAYCAST (RIGHT HAND)
// =====================
function updateUI(){

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits=raycaster.intersectObjects(ui);

    ui.forEach(o=>o.material.emissiveIntensity=0.5);

    if(hits.length){

        const obj=hits[0].object;

        obj.material.emissiveIntensity=1.5;

        // 🎯 IMPACT DOT POSITION
        impactDot.position.copy(hits[0].point);

        if(controller0.userData.selecting && model){

            if(obj.userData.type==="color"){

                model.traverse(m=>{
                    if(m.isMesh) m.material.color.set(obj.userData.color);
                });
            }
        }

    } else {
        impactDot.position.set(0,-999,0);
    }
}

controller0.addEventListener("selectstart",()=>controller0.userData.selecting=true);
controller0.addEventListener("selectend",()=>controller0.userData.selecting=false);

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    updateUI();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
