<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Clean Stable Viewer</title>

<style>
body { margin:0; overflow:hidden; }
#ui {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 12px;
  color: white;
  font-family: sans-serif;
}
</style>
</head>

<body>

<div id="ui">
  Zoom:
  <input id="zoom" type="range" min="0.3" max="3" step="0.01" value="1">
  <button id="lock">LOCK</button>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 50);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:["hit-test"] }));

// =====================
// LIGHT (forte per evitare “nero”)
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x999999, 2.5));

const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(3,5,2);
scene.add(dir);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

  model = gltf.scene;
  scene.add(model);

  // RESET POSIZIONE: sempre davanti camera
  model.position.set(0, 0, -1.2);

  // SCALE BASE = 1 (100%)
  model.scale.set(1,1,1);
});

// =====================
// CONTROLLERS
// =====================
const controllerR = renderer.xr.getController(0);
const controllerL = renderer.xr.getController(1);

scene.add(controllerR);
scene.add(controllerL);

// =====================
// LASERS CORRETTI (WORLD DIRECTION)
// =====================
function createLaser(color) {

  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
  ]);

  const mat = new THREE.LineBasicMaterial({ color });

  const line = new THREE.Line(geo, mat);
  scene.add(line);

  return line;
}

const laserR = createLaser(0x00ffff);
const laserL = createLaser(0xff00ff);

const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// =====================
// LASER UPDATE (FIX DIREZIONE)
// =====================
function updateLaser(controller, laser) {

  if (!model) return [];

  const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);

  const dir = new THREE.Vector3();
  controller.getWorldDirection(dir); // 🔥 FIX IMPORTANTE

  raycaster.set(origin, dir);

  const hits = raycaster.intersectObject(model, true);

  laser.position.copy(origin);

  laser.quaternion.setFromUnitVectors(
    new THREE.Vector3(0,0,-1),
    dir.clone().normalize()
  );

  laser.scale.z = 2;

  return hits;
}

// =====================
// UI STATE
// =====================
let selected = null;
let locked = false;

// =====================
// PICK
// =====================
function pick(controller) {

  if (!model) return;

  const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
  const dir = new THREE.Vector3();

  controller.getWorldDirection(dir);

  raycaster.set(origin, dir);

  const hits = raycaster.intersectObject(model, true);

  if (hits.length > 0) {
    selected = hits[0].object;
  }
}

// =====================
// CLICK
// =====================
function click(controller) {
  pick(controller);
}

controllerR.addEventListener("select", () => click(controllerR));
controllerL.addEventListener("select", () => click(controllerL));

// =====================
// SLIDER ZOOM (FIX DEFINITIVO)
// =====================
const zoomSlider = document.getElementById("zoom");

zoomSlider.addEventListener("input", () => {

  if (!model) return;

  const v = parseFloat(zoomSlider.value);

  model.scale.set(v, v, v);
});

// =====================
// LOCK
// =====================
document.getElementById("lock").onclick = () => {
  locked = !locked;
};

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

  updateLaser(controllerR, laserR);
  updateLaser(controllerL, laserL);

  renderer.render(scene, camera);
});

</script>

</body>
</html>
