<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Full Corrected</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    40
);

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// =====================
// LUCI
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// =====================
// MODELLO
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.5 / size);

    model.position.set(0, 0, -1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// laser visivi
function addRay(controller, color) {

    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -1)
    ]);

    const line = new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({ color })
    );

    controller.add(line);
}

addRay(controller0, 0xff0000);
addRay(controller1, 0x00ff00);

// =====================
// INPUT STATE (NON MODIFICATO)
// =====================
let draggingMove = false;
let rotating = false;
let pinchActive = false;

let baseDistance = null;
let baseScale = 1;

const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// =====================
// CONTROLLER EVENTS (NON MODIFICATI)
// =====================
controller0.addEventListener("selectstart", () => {
    draggingMove = true;
    pinchActive = true;
    controller0.userData.isSelecting = true;
});

controller0.addEventListener("selectend", () => {
    draggingMove = false;
    pinchActive = false;
    baseDistance = null;
    controller0.userData.isSelecting = false;
});

controller1.addEventListener("selectstart", () => {
    rotating = true;
    pinchActive = true;
});

controller1.addEventListener("selectend", () => {
    rotating = false;
    pinchActive = false;
    baseDistance = null;
});

// =====================
// MOVE
// =====================
function updateMove(controller) {

    if (!model) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

    const target = new THREE.Vector3();
    raycaster.ray.at(1.5, target);

    model.position.lerp(target, 0.25);
}

// =====================
// ROTATE
// =====================
const lastPos = new THREE.Vector3();

function updateRotate(controller) {

    if (!model) return;

    const current = new THREE.Vector3();
    current.setFromMatrixPosition(controller.matrixWorld);

    const deltaX = current.x - lastPos.x;

    model.rotation.y += deltaX * 2.0;

    lastPos.copy(current);
}

// =====================
// PINCH SCALE
// =====================
function updatePinch() {

    if (!model || !pinchActive) {
        baseDistance = null;
        return;
    }

    const p1 = new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const p2 = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    const d = p1.distanceTo(p2);

    if (baseDistance === null) {
        baseDistance = d;
        baseScale = model.scale.x;
    }

    model.scale.setScalar(baseScale * (d / baseDistance));
}

// =====================
// 🎨 5 COLOR BUTTONS (FIXED XR)
// =====================
const buttons = [];
const colors = [
    0xff0000,
    0x00ff00,
    0x0000ff,
    0xffff00,
    0xff00ff
];

// POSIZIONE: PIÙ VICINI E PIÙ BASSI (FACILI DA COLPIRE)
for (let i = 0; i < colors.length; i++) {

    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshStandardMaterial({
            color: colors[i],
            emissive: colors[i],
            emissiveIntensity: 0.4
        })
    );

    mesh.position.set((i - 2) * 0.18, 0.6, -0.6);
    mesh.userData.color = colors[i];

    scene.add(mesh);
    buttons.push(mesh);
}

// =====================
// COLOR PICK XR (CORRETTO)
// =====================
function updateColorPick() {

    if (!model) return;

    const origin = new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const dir = new THREE.Vector3(0, 0, -1).applyMatrix4(controller0.matrixWorld);

    raycaster.set(origin, dir);

    const hit = raycaster.intersectObjects(buttons);

    // reset glow
    buttons.forEach(b => b.material.emissiveIntensity = 0.4);

    if (hit.length) {

        const obj = hit[0].object;
        obj.material.emissiveIntensity = 1.2;

        if (controller0.userData.isSelecting) {

            const color = obj.userData.color;

            model.traverse(o => {
                if (o.isMesh) {
                    o.material.color.set(color);
                }
            });
        }
    }
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

    if (draggingMove) updateMove(controller0);
    if (rotating) updateRotate(controller1);

    updatePinch();
    updateColorPick();

    renderer.render(scene, camera);
});

</script>

</body>
</html>
