<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR STEP 2</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// LUCE
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

// CUBO BASE
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.3,0.3),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);
cube.position.set(0, 1.5, -1);
scene.add(cube);

// 🎮 CONTROLLER XR (NUOVO)
const controller1 = renderer.xr.getController(0);
const controller2 = renderer.xr.getController(1);

scene.add(controller1);
scene.add(controller2);

// 🔴 LASER VISIVO (controller 1)
function addLaser(controller) {

    const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);

    const line = new THREE.Line(
        geometry,
        new THREE.LineBasicMaterial({ color: 0xff0000 })
    );

    controller.add(line);
}

addLaser(controller1);
addLaser(controller2);

// LOOP
renderer.setAnimationLoop(() => {

    cube.rotation.y += 0.01;
    renderer.render(scene, camera);

});

</script>

</body>
</html>
