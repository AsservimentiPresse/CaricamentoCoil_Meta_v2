<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Full Interaction System</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
scene.add(new THREE.DirectionalLight(0xffffff, 2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf)=>{

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5 / size);
    model.position.set(0,0,-1);
});

// =====================
// CONTROLLERS
// =====================
const controller0 = renderer.xr.getController(0); // right = UI click
const controller1 = renderer.xr.getController(1); // left = interaction

scene.add(controller0);
scene.add(controller1);

// =====================
// MODE SYSTEM
// =====================
let mode = "move";

// =====================
// MR UI (3D BUTTONS)
// =====================
const ui = [];
const raycaster = new THREE.Raycaster();

// COLORS BUTTONS
const colors = [0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff];

for(let i=0;i<colors.length;i++){

    const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.05,16,16),
        new THREE.MeshStandardMaterial({
            color:colors[i],
            emissive:colors[i],
            emissiveIntensity:0.5
        })
    );

    m.position.set(-0.3 + i*0.15, 1.2, -0.6);
    m.userData.type = "color";
    m.userData.color = colors[i];

    scene.add(m);
    ui.push(m);
}

// MODE BUTTONS IN MR SPACE
const modes = ["move","rotate","zoom"];

for(let i=0;i<modes.length;i++){

    const m = new THREE.Mesh(
        new THREE.BoxGeometry(0.08,0.08,0.08),
        new THREE.MeshStandardMaterial({color:0x222222})
    );

    m.position.set(-0.2 + i*0.2, 1.05, -0.6);
    m.userData.type = "mode";
    m.userData.mode = modes[i];

    scene.add(m);
    ui.push(m);
}

// =====================
// UI INTERACTION (RIGHT HAND ONLY)
// =====================
const tempMatrix = new THREE.Matrix4();

function updateUI(){

    tempMatrix.identity().extractRotation(controller0.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObjects(ui);

    ui.forEach(o=>{
        o.material.emissiveIntensity = 0.5;
    });

    if(hits.length){

        const obj = hits[0].object;
        obj.material.emissiveIntensity = 1.5;

        if(controller0.userData.selecting){

            if(obj.userData.type==="color"){

                model.traverse(m=>{
                    if(m.isMesh) m.material.color.set(obj.userData.color);
                });
            }

            if(obj.userData.type==="mode"){
                mode = obj.userData.mode;
            }
        }
    }
}

// =====================
// EVENTS
// =====================
controller0.addEventListener("selectstart",()=>controller0.userData.selecting=true);
controller0.addEventListener("selectend",()=>controller0.userData.selecting=false);

// =====================
// MOVE
// =====================
function move(){

    if(!model) return;

    const p = new THREE.Vector3();
    p.setFromMatrixPosition(controller1.matrixWorld);

    model.position.lerp(new THREE.Vector3(p.x,p.y,p.z-1),0.2);
}

// =====================
// ROTATE
// =====================
const last = new THREE.Vector3();

function rotate(){

    if(!model) return;

    const p = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    model.rotation.y += (p.x - last.x)*2;

    last.copy(p);
}

// =====================
// ZOOM (PINCH)
// =====================
let baseD=null, baseS=1;

function zoom(){

    const p1 = new THREE.Vector3().setFromMatrixPosition(controller0.matrixWorld);
    const p2 = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

    const d = p1.distanceTo(p2);

    if(baseD===null){
        baseD=d;
        baseS=model.scale.x;
    }

    model.scale.setScalar(baseS*(d/baseD));
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(()=>{

    updateUI();

    if(mode==="move") move();
    if(mode==="rotate") rotate();
    if(mode==="zoom") zoom();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
