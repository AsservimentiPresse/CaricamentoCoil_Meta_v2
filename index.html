<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Wrist UI Final</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
  requiredFeatures:["hit-test"]
}));

// =====================
// LIGHT
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x888888, 2));

const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(5,5,5);
scene.add(dir);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

  model = gltf.scene;
  scene.add(model);

  model.position.set(0,0,-1);
  model.scale.set(1,1,1);
});

// =====================
// CONTROLLERS
// =====================
const right = renderer.xr.getController(0);
const left = renderer.xr.getController(1);

scene.add(right);
scene.add(left);

// =====================
// LASERS (pointer)
// =====================
function makeLaser(color) {

  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
  ]);

  const mat = new THREE.LineBasicMaterial({ color });

  const line = new THREE.Line(geo, mat);
  scene.add(line);

  return line;
}

const laserR = makeLaser(0x00ffff);
const laserL = makeLaser(0xff00ff);

// =====================
// WORLD RAYCAST
// =====================
const raycaster = new THREE.Raycaster();

// =====================
// MODEL PICK
// =====================
let selected = null;

function pick(controller) {

  if (!model) return;

  const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
  const dir = new THREE.Vector3();

  controller.getWorldDirection(dir);

  raycaster.set(origin, dir);

  const hits = raycaster.intersectObject(model, true);

  if (hits.length > 0) selected = hits[0].object;
}

// =====================
// WRIST UI (LEFT HAND)
// =====================
const wrist = new THREE.Group();
scene.add(wrist);

// panel
const panel = new THREE.Mesh(
  new THREE.BoxGeometry(0.25, 0.18, 0.02),
  new THREE.MeshStandardMaterial({
    color: 0x111111,
    emissive: 0x222222,
    emissiveIntensity: 0.5
  })
);

wrist.add(panel);
panel.position.set(0, -0.05, -0.1);

// buttons
function makeBtn(x, y, color, label) {

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(0.08,0.05,0.02),
    new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.5
    })
  );

  b.position.set(x,y,0.02);
  b.name = label;

  panel.add(b);

  return b;
}

const btnLock = makeBtn(-0.07, 0.03, 0xff4444, "lock");
const btnZoom = makeBtn(0.07, 0.03, 0x44ff44, "zoom");

// =====================
// STATE
// =====================
let locked = false;
let zoomMode = false;

// =====================
// ATTACH WRIST TO LEFT HAND
// =====================
function updateWrist() {

  const pos = new THREE.Vector3().setFromMatrixPosition(left.matrixWorld);

  wrist.position.copy(pos);

  const rot = new THREE.Quaternion().setFromRotationMatrix(left.matrixWorld);
  wrist.quaternion.copy(rot);
}

// =====================
// UI RAY FROM RIGHT HAND
// =====================
function uiRaycast() {

  if (!zoomMode && !locked) return;

  const origin = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);
  const dir = new THREE.Vector3();

  right.getWorldDirection(dir);

  raycaster.set(origin, dir);

  const hits = raycaster.intersectObjects([btnLock, btnZoom]);

  if (hits.length > 0) {

    const h = hits[0].object;

    if (h === btnLock) locked = !locked;
    if (h === btnZoom) zoomMode = !zoomMode;
  }
}

// =====================
// MOVE / ROTATE
// =====================
function moveModel() {

  if (!model || locked) return;

  const p = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);
  model.position.lerp(p, 0.2);
}

const last = new THREE.Vector3();

function rotateModel() {

  if (!model || locked) return;

  const p = new THREE.Vector3().setFromMatrixPosition(left.matrixWorld);

  const dx = p.x - last.x;

  model.rotation.y += dx * 2;

  last.copy(p);
}

// =====================
// ZOOM (only if enabled)
// =====================
let baseDist = null;
let baseScale = 1;

function dist(a,b) {

  const p1 = new THREE.Vector3().setFromMatrixPosition(a.matrixWorld);
  const p2 = new THREE.Vector3().setFromMatrixPosition(b.matrixWorld);

  return p1.distanceTo(p2);
}

function zoom() {

  if (!model || locked || !zoomMode) return;

  const d = dist(right,left);

  if (baseDist === null) {
    baseDist = d;
    baseScale = model.scale.x;
    return;
  }

  model.scale.setScalar(baseScale * (d / baseDist));
}

function resetZoom() {
  baseDist = null;
}

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

  if (model) {

    updateWrist();

    uiRaycast();

    moveModel();
    rotateModel();

    if (zoomMode) zoom();
    else resetZoom();
  }

  renderer.render(scene,camera);
});

</script>

</body>
</html>
