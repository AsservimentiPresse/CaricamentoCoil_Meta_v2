<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Hand Tracking Industrial Menu</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
</style>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);

let renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

document.body.appendChild(ARButton.createButton(renderer, {
  requiredFeatures: ["hand-tracking"]
}));

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

// ======================
// MODEL
// ======================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf)=>{

  model = gltf.scene;
  scene.add(model);

  model.position.set(0,0,-0.8);
  model.scale.set(1,1,1);
});

// ======================
// HANDS
// ======================
const controller1 = renderer.xr.getHand(0);
const controller2 = renderer.xr.getHand(1);

scene.add(controller1);
scene.add(controller2);

// helper pinch detection
function isPinching(hand){

  const indexTip = hand.joints["index-finger-tip"];
  const thumbTip = hand.joints["thumb-tip"];

  if(!indexTip || !thumbTip) return false;

  const d = indexTip.position.distanceTo(thumbTip.position);

  return d < 0.03;
}

// palm facing camera (approx)
function palmFacingCamera(hand){

  const palm = hand.joints["wrist"];
  if(!palm) return false;

  const v = new THREE.Vector3();
  v.setFromMatrixPosition(palm.matrixWorld);

  const camDir = new THREE.Vector3(0,0,-1);

  return v.z < 0.2;
}

// ======================
// MENU RADIAL
// ======================
const menu = new THREE.Group();
scene.add(menu);
menu.visible = false;

function createButton(label, x, y, color){

  const mesh = new THREE.Mesh(
    new THREE.CircleGeometry(0.05, 32),
    new THREE.MeshStandardMaterial({ color })
  );

  mesh.position.set(x,y,0);
  mesh.userData.label = label;

  menu.add(mesh);
  return mesh;
}

const btnMove = createButton("MOVE", -0.1, 0.1, 0x00ff00);
const btnRot  = createButton("ROT",  0.1, 0.1, 0xffaa00);
const btnScale= createButton("SCALE",-0.1,-0.1,0x00aaff);
const btnColor= createButton("COLOR", 0.1,-0.1,0xff00ff);
const btnLock = createButton("LOCK",  0, 0, 0xff0000);

// ======================
// STATE
// ======================
let mode = "MOVE";
let locked = false;

// ======================
// RAYCAST MENU
// ======================
const raycaster = new THREE.Raycaster();

function menuRay(hand){

  const tempMatrix = new THREE.Matrix4();
  tempMatrix.identity().extractRotation(hand.matrixWorld);

  const origin = new THREE.Vector3().setFromMatrixPosition(hand.matrixWorld);
  const dir = new THREE.Vector3(0,0,-1).applyMatrix4(tempMatrix);

  raycaster.set(origin, dir);

  const hits = raycaster.intersectObjects(menu.children);

  if(hits.length>0){

    const h = hits[0].object;

    if(h.userData.label){
      mode = h.userData.label;

      if(mode === "LOCK"){
        locked = !locked;
      }
    }
  }
}

// ======================
// MENU POSITION (LEFT HAND)
// ======================
function updateMenu(hand){

  const p = new THREE.Vector3().setFromMatrixPosition(hand.matrixWorld);
  menu.position.copy(p);
}

// ======================
// MODEL CONTROL
// ======================
let lastLeft = new THREE.Vector3();

function updateModel(){

  if(!model || locked) return;

  const right = controller2;

  const pos = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);

  if(mode === "MOVE"){
    model.position.lerp(pos, 0.2);
  }

  if(mode === "COLOR"){
    model.traverse(o=>{
      if(o.isMesh){
        o.material.color.setHSL(Math.random(),1,0.5);
      }
    });
  }
}

// ROTATE
function rotateModel(){

  if(!model || locked || mode !== "ROT") return;

  const p = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);

  const dx = p.x - lastLeft.x;

  model.rotation.y += dx * 3;

  lastLeft.copy(p);
}

// SCALE (pinch both hands)
function scaleModel(){

  if(!model || locked || mode !== "SCALE") return;

  const a = new THREE.Vector3().setFromMatrixPosition(controller1.matrixWorld);
  const b = new THREE.Vector3().setFromMatrixPosition(controller2.matrixWorld);

  const d = a.distanceTo(b);

  model.scale.setScalar(d * 2);
}

// ======================
// LOOP
// ======================
renderer.setAnimationLoop(()=>{

  const left = controller1;
  const right = controller2;

  const pinchLeft = isPinching(left);

  // OPEN MENU
  if(pinchLeft && palmFacingCamera(left)){
    menu.visible = true;
  } else {
    menu.visible = false;
  }

  if(menu.visible){
    updateMenu(left);
    menuRay(right);
  }

  updateModel();
  rotateModel();
  scaleModel();

  renderer.render(scene,camera);
});

</script>
</head>
<body></body>
</html>
