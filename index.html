<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR TRUE GRAB (NO LAG)</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// SCENE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] }));

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2));
scene.add(new THREE.DirectionalLight(0xffffff,2));

// MODEL
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb",(gltf)=>{

    model=gltf.scene;
    scene.add(model);

    const box=new THREE.Box3().setFromObject(model);
    const size=box.getSize(new THREE.Vector3()).length();

    model.scale.setScalar(1.5/size);
    model.position.set(0,0,-1);
});

// CONTROLLERS
const left = renderer.xr.getController(0);
const right = renderer.xr.getController(1);

scene.add(left);
scene.add(right);

// LASER
function makeLaser(color){
    const geo=new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);
    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color}));
    line.scale.z=10;
    return line;
}

left.add(makeLaser(0x00ff00));
right.add(makeLaser(0xff0000));

// =====================
// MODE
// =====================
let mode="move";
let frozen=false;

// =====================
// UI (BELLA)
// =====================
const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

const modes=[
    {name:"MOVE", color:0x00ffcc},
    {name:"ROTATE", color:0xffcc00},
    {name:"ZOOM", color:0x66aaff},
    {name:"LOCK", color:0xff4444}
];

const ui=[];

for(let i=0;i<modes.length;i++){

    const group=new THREE.Group();

    const box=new THREE.Mesh(
        new THREE.BoxGeometry(0.09,0.09,0.09),
        new THREE.MeshStandardMaterial({color:modes[i].color})
    );

    const canvas=document.createElement("canvas");
    canvas.width=256;
    canvas.height=128;
    const ctx=canvas.getContext("2d");

    ctx.fillStyle="white";
    ctx.font="bold 60px Arial";
    ctx.fillText(modes[i].name,20,80);

    const tex=new THREE.CanvasTexture(canvas);

    const label=new THREE.Mesh(
        new THREE.PlaneGeometry(0.15,0.07),
        new THREE.MeshBasicMaterial({map:tex,transparent:true})
    );

    label.position.set(0,-0.08,0);

    group.add(box);
    group.add(label);

    group.position.set(-0.35 + i*0.23, 0.7, -0.6);

    group.userData.mode=modes[i].name.toLowerCase();

    scene.add(group);
    ui.push(group);
}

// SELECT MODE
left.addEventListener("selectstart",()=>left.userData.click=true);
left.addEventListener("selectend",()=>left.userData.click=false);

function updateUI(){

    tempMatrix.identity().extractRotation(left.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(left.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits=raycaster.intersectObjects(ui,true);

    if(hits.length){

        const root=hits[0].object.parent;

        if(left.userData.click){

            if(root.userData.mode==="lock"){
                frozen=!frozen;
            } else {
                mode=root.userData.mode;
            }
        }
    }
}

// =====================
// TRUE GRAB SYSTEM
// =====================
let grabbing=false;
let originalParent=null;

// START GRAB
right.addEventListener("selectstart",()=>{

    if(!model || frozen) return;

    if(mode==="move"){

        grabbing=true;

        originalParent = model.parent;

        right.attach(model); // 🔥 ATTACCO ALLA MANO
    }
});

// STOP GRAB
right.addEventListener("selectend",()=>{

    if(!grabbing) return;

    grabbing=false;

    scene.attach(model); // 🔥 RITORNA NELLA SCENA
});

// ROTATE + ZOOM CONTINUO
function updateOtherModes(){

    if(!model || frozen || !grabbing) return;

    if(mode==="rotate"){
        model.rotation.y += 0.03;
    }

    if(mode==="zoom"){
        model.scale.multiplyScalar(1.01);
    }
}

// LOOP
renderer.setAnimationLoop(()=>{

    updateUI();
    updateOtherModes();

    renderer.render(scene,camera);
});

</script>

</body>
</html>
