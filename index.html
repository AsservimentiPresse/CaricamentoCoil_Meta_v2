<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR FIX VISIBILITY</title>

<style>
body { margin: 0; overflow: hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// 🔥 LUCE FORTE (IMPORTANTE IN MR)
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(2, 5, 2);
scene.add(light);

// 🔷 GROUND REFERENCE (IMPORTANTE)
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide, transparent: true, opacity: 0.2 })
);
floor.rotation.x = -Math.PI/2;
floor.position.set(0, 0, -1);
scene.add(floor);

// 🔥 OGGETTI VISIBILI DAVANTI ALL'UTENTE
const objects = [];

function createButton(x, label, color) {

    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.1, 0.1),
        new THREE.MeshStandardMaterial({ color })
    );

    // 🔥 IMPORTANTISSIMO: davanti all’utente (non a caso)
    mesh.position.set(x, 1.3, -0.7);

    mesh.userData.label = label;

    scene.add(mesh);
    objects.push(mesh);

    return mesh;
}

createButton(-0.3, "A1", 0xff0000);
createButton(-0.15, "A2", 0x00ff00);
createButton(0, "A3", 0x0000ff);
createButton(0.15, "A4", 0xffff00);
createButton(0.3, "A5", 0xff00ff);

// 🎮 CONTROLLER
const controller = renderer.xr.getController(0);
scene.add(controller);

// RAY VISIVO
const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
]);

const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0xff0000 }));
controller.add(ray);

// 🎯 RAYCAST
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

controller.addEventListener("selectstart", () => {

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObjects(objects);

    if (hits.length > 0) {
        hits[0].object.material.color.set(Math.random() * 0xffffff);
    }
});

// 🔁 LOOP
renderer.setAnimationLoop(() => {

    renderer.render(scene, camera);
});

</script>

</body>
</html>
