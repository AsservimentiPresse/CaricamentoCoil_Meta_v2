<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Full System</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// =====================
// LIGHT
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.2 / size);

    model.position.set(0, 0, -1);

});

// =====================
// HIT TEST (floor anchor)
// =====================
let hitTestSource = null;
let hitTestSourceRequested = false;
let reticle;

reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1, 0.12, 32),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
);
reticle.rotation.x = -Math.PI / 2;
reticle.visible = false;
scene.add(reticle);

// =====================
// CONTROLLERS
// =====================
const controller = renderer.xr.getController(0);
scene.add(controller);

// ray visual
const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
]);

const rayLine = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0xff0000 }));
controller.add(rayLine);

// =====================
// INTERACTION
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

let selected = null;

// =====================
// UI 3D (ORBITAL)
// =====================
const uiGroup = new THREE.Group();
scene.add(uiGroup);

function createButton(label, x, color, callback) {

    const geo = new THREE.BoxGeometry(0.1,0.05,0.02);
    const mat = new THREE.MeshStandardMaterial({ color });

    const btn = new THREE.Mesh(geo, mat);
    btn.position.set(x, 1.2, -0.8);

    btn.userData.onClick = callback;

    uiGroup.add(btn);
    return btn;
}

// UI buttons
createButton("RED", -0.2, 0xff0000, () => {
    if (selected) selected.material.color.set(0xff0000);
});

createButton("GREEN", 0, 0x00ff00, () => {
    if (selected) selected.material.color.set(0x00ff00);
});

createButton("BLUE", 0.2, 0x0000ff, () => {
    if (selected) selected.material.color.set(0x0000ff);
});

// =====================
// HAND / CONTROLLER INPUT (fallback)
// =====================
let dragging = false;

controller.addEventListener("selectstart", () => dragging = true);
controller.addEventListener("selectend", () => dragging = false);

// =====================
// RAYCAST PICKING (mesh selection)
// =====================
function pick() {

    if (!model) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObject(model, true);

    if (hits.length > 0) {
        selected = hits[0].object;
    }
}

// =====================
// MOVE MODEL
// =====================
function moveModel() {

    if (!model) return;

    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(controller.matrixWorld);

    model.position.lerp(pos, 0.2);
}

// =====================
// UPDATE LOOP
// =====================
renderer.setAnimationLoop((timestamp, frame) => {

    // HIT TEST FLOOR
    const session = renderer.xr.getSession();

    if (session && !hitTestSourceRequested) {

        session.requestReferenceSpace("viewer").then((refSpace) => {
            session.requestHitTestSource({ space: refSpace }).then((source) => {
                hitTestSource = source;
            });
        });

        hitTestSourceRequested = true;
    }

    if (hitTestSource && frame) {

        const refSpace = renderer.xr.getReferenceSpace();
        const hitResults = frame.getHitTestResults(hitTestSource);

        if (hitResults.length > 0) {

            const hit = hitResults[0];
            const pose = hit.getPose(refSpace);

            reticle.visible = true;
            reticle.position.set(
                pose.transform.position.x,
                pose.transform.position.y,
                pose.transform.position.z
            );
        }
    }

    // INTERACTION
    if (dragging) {
        moveModel();
    }

    // PICK on tap
    controller.addEventListener("select", pick);

    renderer.render(scene, camera);
});

</script>

</body>
</html>
