<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR Industrial Final Pro</title>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// =====================
// LIGHT (più moderno)
// =====================
scene.add(new THREE.HemisphereLight(0xffffff, 0x666666, 2));

const dir = new THREE.DirectionalLight(0xffffff, 2.5);
dir.position.set(5,10,5);
scene.add(dir);

// =====================
// MODEL
// =====================
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.2 / size);

    model.position.set(0, 0, -1);
});

// =====================
// LOCK STATE
// =====================
let locked = false;

// =====================
// CONTROLLERS
// =====================
const right = renderer.xr.getController(0);
const left = renderer.xr.getController(1);

scene.add(right);
scene.add(left);

// =====================
// VISUAL POINTER (CURSORS FIX)
// =====================
function createCursor(color) {

    const cursor = new THREE.Mesh(
        new THREE.SphereGeometry(0.01, 16, 16),
        new THREE.MeshBasicMaterial({
            color,
            emissive: color,
            emissiveIntensity: 1
        })
    );

    scene.add(cursor);
    return cursor;
}

const cursorR = createCursor(0x00ffff);
const cursorL = createCursor(0xff00ff);

// =====================
// UPDATE CURSORS
// =====================
function updateCursors() {

    const rp = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);
    const lp = new THREE.Vector3().setFromMatrixPosition(left.matrixWorld);

    cursorR.position.copy(rp);
    cursorL.position.copy(lp);
}

// =====================
// STATE
// =====================
let move = false;
let rotate = false;

let baseDistance = null;
let baseScale = 1;

// =====================
// DIST
// =====================
function dist(a,b) {
    const p1 = new THREE.Vector3().setFromMatrixPosition(a.matrixWorld);
    const p2 = new THREE.Vector3().setFromMatrixPosition(b.matrixWorld);
    return p1.distanceTo(p2);
}

// =====================
// MOVE / ROTATE ONLY IF NOT LOCKED
// =====================
right.addEventListener("selectstart", () => move = true);
right.addEventListener("selectend", () => move = false);

left.addEventListener("selectstart", () => rotate = true);
left.addEventListener("selectend", () => rotate = false);

// =====================
// MOVE
// =====================
function updateMove() {

    if (!model || locked) return;

    const p = new THREE.Vector3().setFromMatrixPosition(right.matrixWorld);
    model.position.lerp(p, 0.2);
}

// =====================
// ROTATE
// =====================
const last = new THREE.Vector3();

function updateRotate() {

    if (!model || locked) return;

    const p = new THREE.Vector3().setFromMatrixPosition(left.matrixWorld);

    const dx = p.x - last.x;
    model.rotation.y += dx * 2.0;

    last.copy(p);
}

// =====================
// ZOOM (PINCH IMPROVED)
// =====================
function updateZoom() {

    if (!model || locked) return;

    const d = dist(right, left);

    if (baseDistance === null) {
        baseDistance = d;
        baseScale = model.scale.x;
        return;
    }

    model.scale.setScalar(baseScale * (d / baseDistance));
}

// =====================
// UI
// =====================
const ui = new THREE.Group();
scene.add(ui);

const buttons = [];

function makeBtn(x, color, fn, label) {

    const b = new THREE.Mesh(
        new THREE.BoxGeometry(0.12,0.06,0.02),
        new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.5
        })
    );

    b.position.set(x, 0.25, -0.4); // 🔥 VICINO AL GLB
    b.userData.fn = fn;
    b.name = label;

    ui.add(b);
    buttons.push(b);

    return b;
}

// COLORI BRILLANTI
makeBtn(-0.25, 0xff3b3b, () => {
    if (selected) selected.material.color.set(0xff3b3b);
}, "red");

makeBtn(0, 0x3bff6a, () => {
    if (selected) selected.material.color.set(0x3bff6a);
}, "green");

makeBtn(0.25, 0x3b82ff, () => {
    if (selected) selected.material.color.set(0x3b82ff);
}, "blue");

// 🔒 LOCK BUTTON
makeBtn(0.0, 0xffff00, () => {
    locked = !locked;
}, "lock");

// =====================
// ATTACH UI TO MODEL
// =====================
function attachUI() {

    if (!model) return;

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());

    ui.position.copy(center);
    ui.position.y += 0.6;
}

// =====================
// PICK SYSTEM
// =====================
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

let selected = null;

function pick(controller) {

    if (!model) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObject(model, true);

    if (hits.length > 0) selected = hits[0].object;
}

// =====================
// CLICK UI
// =====================
function click(controller) {

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const hits = raycaster.intersectObjects(buttons);

    if (hits.length > 0) {
        hits[0].object.userData.fn?.();
    } else {
        pick(controller);
    }
}

right.addEventListener("select", () => click(right));
left.addEventListener("select", () => click(left));

// =====================
// LOOP
// =====================
renderer.setAnimationLoop(() => {

    updateCursors();

    if (!locked) {
        if (move) updateMove();
        if (rotate) updateRotate();
        updateZoom();
    }

    attachUI();

    renderer.render(scene, camera);
});

</script>

</body>
</html>
