<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MR INTERACTION STEP</title>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/ARButton.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 40);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

renderer.xr.setReferenceSpaceType("local");

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test"]
}));

// LUCE
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

// MODELLO
let model;

const loader = new GLTFLoader();

loader.load("linea%20lunga_V4.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const size = box.getSize(new THREE.Vector3()).length();
    model.scale.setScalar(1.5 / size);

    model.position.set(0, 0, -1);

});

// 🎮 CONTROLLER
const controller = renderer.xr.getController(0);
scene.add(controller);

// 🔴 LASER VISIVO
const geometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
]);

const line = new THREE.Line(
    geometry,
    new THREE.LineBasicMaterial({ color: 0xff0000 })
);

controller.add(line);

// 🎯 RAYCAST
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// 🔥 INTERAZIONE: MOVE MODELLO
let dragging = false;

controller.addEventListener("selectstart", () => dragging = true);
controller.addEventListener("selectend", () => dragging = false);

function updateInteraction() {

    if (!model || !dragging) return;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const point = new THREE.Vector3();
    raycaster.ray.at(1.5, point);

    model.position.lerp(point, 0.2);
}

// LOOP
renderer.setAnimationLoop(() => {

    updateInteraction();

    renderer.render(scene, camera);

});

</script>

</body>
</html>
